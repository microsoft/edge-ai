# Code Quality Lint Template
#
# Purpose:
# Validates JavaScript/TypeScript code quality using ESLint and JSON formatting
# using Prettier.
#
# Functionality:
# - ESLint: Static analysis for JavaScript and TypeScript files
# - Prettier: Validates JSON file formatting consistency
# - Publishes lint results as pipeline artifacts
#
# Parameters:
# - breakBuild: Fail the pipeline on lint findings (default: false)
# - dependsOn: Jobs that this job depends on
# - displayName: Display name for the job
# - condition: Condition for running the job
# - agentPool: Azure DevOps agent pool configuration
#
# Usage Examples:
# ```yaml
# - template: .azdo/templates/code-quality-lint-template.yml
#
# - template: .azdo/templates/code-quality-lint-template.yml
#   parameters:
#     breakBuild: true
#     dependsOn: ['previousJob']
# ```
---
parameters:
  - name: breakBuild
    type: boolean
    default: false
  - name: dependsOn
    type: object
    default: []
  - name: displayName
    type: string
    default: 'Code Quality Lint'
  - name: condition
    type: string
    default: 'succeeded()'
  - name: agentPool
    type: object
    default:
      name: 'ai-on-edge-managed-pool'
      vmImage: 'ubuntu-latest'

jobs:
  - job: CodeQualityLint
    displayName: ${{ parameters.displayName }}
    dependsOn: ${{ parameters.dependsOn }}
    condition: ${{ parameters.condition }}
    pool: ${{ parameters.agentPool }}
    steps:
      - checkout: self

      # For PR builds, checkout the source branch HEAD instead of merge ref
      - task: Bash@3
        displayName: 'Checkout PR source branch HEAD'
        condition: eq(variables['Build.Reason'], 'PullRequest')
        inputs:
          targetType: 'inline'
          script: |
            BRANCH_NAME=$(echo "$(System.PullRequest.SourceBranch)" | sed 's|^refs/heads/||')
            echo "Switching to PR source branch HEAD: $BRANCH_NAME"
            git checkout "$BRANCH_NAME"
            git log -1 --oneline

      - task: UseNode@1
        displayName: 'Use Node.js 24.x'
        inputs:
          version: '24.x'

      - task: Bash@3
        displayName: 'Install Dependencies'
        inputs:
          targetType: 'inline'
          script: |
            set -euo pipefail
            mkdir -p code-quality-results
            npm ci

      - task: Bash@3
        displayName: 'Run Code Quality Lint'
        inputs:
          targetType: 'inline'
          script: |
            set -uo pipefail
            LINT_FAILED=false

            echo "=== Running ESLint ==="
            if ! npx eslint . --max-warnings 9999 2>&1 | tee code-quality-results/eslint-results.txt; then
              echo "##vso[task.logissue type=error]ESLint found issues"
              LINT_FAILED=true
            fi

            echo "=== Running Prettier JSON check ==="
            if ! npx prettier --check "**/*.json" 2>&1 | tee code-quality-results/prettier-results.txt; then
              echo "##vso[task.logissue type=error]Prettier found JSON formatting issues"
              LINT_FAILED=true
            fi

            if [ "$LINT_FAILED" = "true" ]; then
              BREAK_BUILD="${{ parameters.breakBuild }}"
              if [ "$BREAK_BUILD" = "True" ]; then
                echo "##vso[task.logissue type=error]Code quality lint failures detected and breakBuild is enabled"
                exit 1
              else
                echo "##vso[task.logissue type=warning]Code quality lint failures detected but breakBuild is disabled"
              fi
            else
              echo "All code quality lint checks passed"
            fi

      - task: PublishPipelineArtifact@1
        displayName: 'Publish Code Quality Lint Results Artifacts'
        condition: always()
        inputs:
          targetPath: '$(Build.SourcesDirectory)/code-quality-results'
          artifactName: 'code-quality-results'
        continueOnError: true
