# Bicep Lint Template
#
# Purpose:
# Validates Bicep files for syntax errors and best practices using the Azure CLI
# bicep build command.
#
# Functionality:
# - Compiles all .bicep files to validate syntax and detect errors
# - Uses bicepconfig.json for lint rule configuration
# - Azure CLI with Bicep is pre-installed on ubuntu-24.04 agents
# - Publishes lint results as pipeline artifacts
#
# Parameters:
# - breakBuild: Fail the pipeline on lint findings (default: false)
# - dependsOn: Jobs that this job depends on
# - displayName: Display name for the job
# - condition: Condition for running the job
# - agentPool: Azure DevOps agent pool configuration
#
# Usage Examples:
# ```yaml
# - template: .azdo/templates/bicep-lint-template.yml
#
# - template: .azdo/templates/bicep-lint-template.yml
#   parameters:
#     breakBuild: true
#     dependsOn: ['previousJob']
# ```
---
parameters:
  - name: breakBuild
    type: boolean
    default: false
  - name: dependsOn
    type: object
    default: []
  - name: displayName
    type: string
    default: 'Bicep Lint'
  - name: condition
    type: string
    default: 'succeeded()'
  - name: agentPool
    type: object
    default:
      name: 'ai-on-edge-managed-pool'
      vmImage: 'ubuntu-latest'

jobs:
  - job: BicepLint
    displayName: ${{ parameters.displayName }}
    dependsOn: ${{ parameters.dependsOn }}
    condition: ${{ parameters.condition }}
    pool: ${{ parameters.agentPool }}
    steps:
      - checkout: self

      # For PR builds, checkout the source branch HEAD instead of merge ref
      - task: Bash@3
        displayName: 'Checkout PR source branch HEAD'
        condition: eq(variables['Build.Reason'], 'PullRequest')
        inputs:
          targetType: 'inline'
          script: |
            BRANCH_NAME=$(echo "$(System.PullRequest.SourceBranch)" | sed 's|^refs/heads/||')
            echo "Switching to PR source branch HEAD: $BRANCH_NAME"
            git checkout "$BRANCH_NAME"
            git log -1 --oneline

      - task: Bash@3
        displayName: 'Run Bicep Lint'
        inputs:
          targetType: 'inline'
          script: |
            set -uo pipefail
            mkdir -p bicep-lint-results
            LINT_FAILED=false

            BICEP_FILES=$(find . -name '*.bicep' \
              -not -path '*/node_modules/*' \
              -not -path '*/.copilot-tracking/*' \
              -type f)

            if [ -z "$BICEP_FILES" ]; then
              echo "No Bicep files found to lint"
              exit 0
            fi

            echo "=== Running az bicep build ==="
            for f in $BICEP_FILES; do
              echo "Building: $f"
              if ! az bicep build --file "$f" 2>&1 | tee -a bicep-lint-results/bicep-build-results.txt; then
                echo "##vso[task.logissue type=error]Bicep build failed for $f"
                LINT_FAILED=true
              fi
            done

            if [ "$LINT_FAILED" = "true" ]; then
              BREAK_BUILD="${{ parameters.breakBuild }}"
              if [ "$BREAK_BUILD" = "True" ]; then
                echo "##vso[task.logissue type=error]Bicep lint failures detected and breakBuild is enabled"
                exit 1
              else
                echo "##vso[task.logissue type=warning]Bicep lint failures detected but breakBuild is disabled"
              fi
            else
              echo "All Bicep lint checks passed"
            fi

      - task: PublishPipelineArtifact@1
        displayName: 'Publish Bicep Lint Results Artifacts'
        condition: always()
        inputs:
          targetPath: '$(Build.SourcesDirectory)/bicep-lint-results'
          artifactName: 'bicep-lint-results'
        continueOnError: true
