# Python Lint Template
#
# Purpose:
# Validates Python scripts using Ruff for fast linting and style enforcement.
#
# Functionality:
# - Ruff: Fast Python linter covering pyflakes, pycodestyle, isort, pep8-naming,
#   pyupgrade, and warning rules
# - Uses project-level ruff.toml for rule configuration
# - Publishes lint results as pipeline artifacts
#
# Parameters:
# - breakBuild: Fail the pipeline on lint findings (default: false)
# - dependsOn: Jobs that this job depends on
# - displayName: Display name for the job
# - condition: Condition for running the job
# - agentPool: Azure DevOps agent pool configuration
#
# Usage Examples:
# ```yaml
# - template: .azdo/templates/python-lint-template.yml
#
# - template: .azdo/templates/python-lint-template.yml
#   parameters:
#     breakBuild: true
#     dependsOn: ['previousJob']
# ```
---
parameters:
  - name: breakBuild
    type: boolean
    default: false
  - name: dependsOn
    type: object
    default: []
  - name: displayName
    type: string
    default: 'Python Lint'
  - name: condition
    type: string
    default: 'succeeded()'
  - name: agentPool
    type: object
    default:
      name: 'ai-on-edge-managed-pool'
      vmImage: 'ubuntu-latest'

jobs:
  - job: PythonLint
    displayName: ${{ parameters.displayName }}
    dependsOn: ${{ parameters.dependsOn }}
    condition: ${{ parameters.condition }}
    pool: ${{ parameters.agentPool }}
    steps:
      - checkout: self

      # For PR builds, checkout the source branch HEAD instead of merge ref
      - task: Bash@3
        displayName: 'Checkout PR source branch HEAD'
        condition: eq(variables['Build.Reason'], 'PullRequest')
        inputs:
          targetType: 'inline'
          script: |
            BRANCH_NAME=$(echo "$(System.PullRequest.SourceBranch)" | sed 's|^refs/heads/||')
            echo "Switching to PR source branch HEAD: $BRANCH_NAME"
            git checkout "$BRANCH_NAME"
            git log -1 --oneline

      - task: Bash@3
        displayName: 'Install Python Lint Tools'
        inputs:
          targetType: 'inline'
          script: |
            set -euo pipefail
            mkdir -p python-lint-results

            echo "Installing Ruff..."
            pip install ruff --quiet
            ruff version

      - task: Bash@3
        displayName: 'Run Python Lint'
        inputs:
          targetType: 'inline'
          script: |
            set -uo pipefail
            LINT_FAILED=false

            PYTHON_FILES=$(find . -name '*.py' \
              -not -path '*/node_modules/*' \
              -not -path '*/.copilot-tracking/*' \
              -type f)

            if [ -z "$PYTHON_FILES" ]; then
              echo "No Python files found to lint"
              exit 0
            fi

            echo "Found $(echo "$PYTHON_FILES" | wc -l) Python file(s) to lint"

            echo "=== Running Ruff Check ==="
            if ! ruff check . \
              --exclude 'node_modules,.copilot-tracking' \
              --output-format=grouped 2>&1 | tee python-lint-results/ruff-results.txt; then
              LINT_FAILED=true
            fi

            if [ "$LINT_FAILED" = "true" ]; then
              BREAK_BUILD="${{ parameters.breakBuild }}"
              if [ "$BREAK_BUILD" = "True" ]; then
                echo "##vso[task.logissue type=error]Python lint failures detected and breakBuild is enabled"
                exit 1
              else
                echo "##vso[task.logissue type=warning]Python lint failures detected but breakBuild is disabled"
              fi
            else
              echo "All Python lint checks passed"
            fi

      - task: PublishPipelineArtifact@1
        displayName: 'Publish Python Lint Results Artifacts'
        condition: always()
        inputs:
          targetPath: '$(Build.SourcesDirectory)/python-lint-results'
          artifactName: 'python-lint-results'
        continueOnError: true
