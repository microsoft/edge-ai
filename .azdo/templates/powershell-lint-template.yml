# PowerShell Lint Template
#
# Purpose:
# Validates PowerShell scripts using PSScriptAnalyzer for static analysis
# and best practice enforcement.
#
# Functionality:
# - PSScriptAnalyzer: Static analysis for PowerShell scripts (.ps1, .psm1, .psd1)
# - Uses project-level PSScriptAnalyzerSettings.psd1 for rule configuration
# - Publishes lint results as pipeline artifacts
#
# Parameters:
# - breakBuild: Fail the pipeline on lint findings (default: false)
# - dependsOn: Jobs that this job depends on
# - displayName: Display name for the job
# - condition: Condition for running the job
# - agentPool: Azure DevOps agent pool configuration
#
# Usage Examples:
# ```yaml
# - template: .azdo/templates/powershell-lint-template.yml
#
# - template: .azdo/templates/powershell-lint-template.yml
#   parameters:
#     breakBuild: true
#     dependsOn: ['previousJob']
# ```
---
parameters:
  - name: breakBuild
    type: boolean
    default: false
  - name: dependsOn
    type: object
    default: []
  - name: displayName
    type: string
    default: 'PowerShell Lint'
  - name: condition
    type: string
    default: 'succeeded()'
  - name: agentPool
    type: object
    default:
      name: 'ai-on-edge-managed-pool'
      vmImage: 'ubuntu-latest'

jobs:
  - job: PowershellLint
    displayName: ${{ parameters.displayName }}
    dependsOn: ${{ parameters.dependsOn }}
    condition: ${{ parameters.condition }}
    pool: ${{ parameters.agentPool }}
    steps:
      - checkout: self

      # For PR builds, checkout the source branch HEAD instead of merge ref
      - task: Bash@3
        displayName: 'Checkout PR source branch HEAD'
        condition: eq(variables['Build.Reason'], 'PullRequest')
        inputs:
          targetType: 'inline'
          script: |
            BRANCH_NAME=$(echo "$(System.PullRequest.SourceBranch)" | sed 's|^refs/heads/||')
            echo "Switching to PR source branch HEAD: $BRANCH_NAME"
            git checkout "$BRANCH_NAME"
            git log -1 --oneline

      - task: Bash@3
        displayName: 'Run PowerShell Lint'
        inputs:
          targetType: 'inline'
          script: |
            set -uo pipefail
            mkdir -p powershell-lint-results

            echo "Installing PSScriptAnalyzer 1.22.0..."
            pwsh -Command "Install-Module -Name PSScriptAnalyzer -RequiredVersion 1.22.0 -Force -Scope CurrentUser"

            echo "=== Running PSScriptAnalyzer ==="
            LINT_FAILED=false

            pwsh -Command "
              \$results = Invoke-ScriptAnalyzer \
                -Path '.' \
                -Settings 'PSScriptAnalyzerSettings.psd1' \
                -Recurse \
                -ExcludeRule PSAvoidUsingWriteHost \
                -ExcludePath @('node_modules', '.copilot-tracking') \
                -ReportSummary

              \$results | Format-Table -AutoSize | Out-String | Tee-Object -FilePath 'powershell-lint-results/psscriptanalyzer-results.txt'

              if (\$results.Count -gt 0) {
                Write-Host '##vso[task.logissue type=error]PSScriptAnalyzer found issues'
                exit 1
              }
            " || LINT_FAILED=true

            if [ "$LINT_FAILED" = "true" ]; then
              BREAK_BUILD="${{ parameters.breakBuild }}"
              if [ "$BREAK_BUILD" = "True" ]; then
                echo "##vso[task.logissue type=error]PowerShell lint failures detected and breakBuild is enabled"
                exit 1
              else
                echo "##vso[task.logissue type=warning]PowerShell lint failures detected but breakBuild is disabled"
              fi
            else
              echo "All PowerShell lint checks passed"
            fi

      - task: PublishPipelineArtifact@1
        displayName: 'Publish PowerShell Lint Results Artifacts'
        condition: always()
        inputs:
          targetPath: '$(Build.SourcesDirectory)/powershell-lint-results'
          artifactName: 'powershell-lint-results'
        continueOnError: true
