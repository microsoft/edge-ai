# Docs Lint Template
#
# Purpose:
# Validates documentation quality using markdownlint, markdown-table-formatter,
# and cspell for spell checking.
#
# Functionality:
# - markdownlint: Enforces Markdown formatting standards
# - markdown-table-formatter: Validates Markdown table formatting
# - cspell: Spell checks documentation and code files
# - Publishes lint results as pipeline artifacts
#
# Parameters:
# - breakBuild: Fail the pipeline on lint findings (default: false)
# - dependsOn: Jobs that this job depends on
# - displayName: Display name for the job
# - condition: Condition for running the job
# - agentPool: Azure DevOps agent pool configuration
#
# Usage Examples:
# ```yaml
# - template: .azdo/templates/docs-lint-template.yml
#
# - template: .azdo/templates/docs-lint-template.yml
#   parameters:
#     breakBuild: true
#     dependsOn: ['previousJob']
# ```
---
parameters:
  - name: breakBuild
    type: boolean
    default: false
  - name: dependsOn
    type: object
    default: []
  - name: displayName
    type: string
    default: 'Docs Lint'
  - name: condition
    type: string
    default: 'succeeded()'
  - name: agentPool
    type: object
    default:
      name: 'ai-on-edge-managed-pool'
      vmImage: 'ubuntu-latest'

jobs:
  - job: DocsLint
    displayName: ${{ parameters.displayName }}
    dependsOn: ${{ parameters.dependsOn }}
    condition: ${{ parameters.condition }}
    pool: ${{ parameters.agentPool }}
    steps:
      - checkout: self

      # For PR builds, checkout the source branch HEAD instead of merge ref
      - task: Bash@3
        displayName: 'Checkout PR source branch HEAD'
        condition: eq(variables['Build.Reason'], 'PullRequest')
        inputs:
          targetType: 'inline'
          script: |
            BRANCH_NAME=$(echo "$(System.PullRequest.SourceBranch)" | sed 's|^refs/heads/||')
            echo "Switching to PR source branch HEAD: $BRANCH_NAME"
            git checkout "$BRANCH_NAME"
            git log -1 --oneline

      - task: UseNode@1
        displayName: 'Use Node.js 20.x'
        inputs:
          version: '20.x'

      - task: Bash@3
        displayName: 'Install Dependencies'
        inputs:
          targetType: 'inline'
          script: |
            set -euo pipefail
            mkdir -p docs-lint-results
            npm ci

      - task: Bash@3
        displayName: 'Run Docs Lint'
        inputs:
          targetType: 'inline'
          script: |
            set -uo pipefail
            LINT_FAILED=false

            echo "=== Running markdownlint ==="
            if ! npx markdownlint-cli2 "**/*.md" \
              "#.copilot-tracking" \
              "#**/copilot-instructions.md" \
              "#.github/instructions" \
              "#.github/prompts" \
              "#.github/agents" \
              "#node_modules" \
              "#venv" \
              2>&1 | tee docs-lint-results/markdownlint-results.txt; then
              echo "##vso[task.logissue type=error]markdownlint found issues"
              LINT_FAILED=true
            fi

            echo "=== Running markdown-table-formatter ==="
            if ! find . -name '*.md' \
              -not -path '*/node_modules/*' \
              -not -path '*/venv/*' \
              -not -path '*/.copilot-tracking/*' \
              -print0 | xargs -0 npx markdown-table-formatter --check 2>&1 | tee docs-lint-results/table-formatter-results.txt; then
              echo "##vso[task.logissue type=error]markdown-table-formatter found issues"
              LINT_FAILED=true
            fi

            echo "=== Running cspell ==="
            if ! npx cspell "**/*.{md,ts,js,json,yml,yaml}" 2>&1 | tee docs-lint-results/cspell-results.txt; then
              echo "##vso[task.logissue type=error]cspell found spelling issues"
              LINT_FAILED=true
            fi

            if [ "$LINT_FAILED" = "true" ]; then
              BREAK_BUILD="${{ parameters.breakBuild }}"
              if [ "$BREAK_BUILD" = "True" ]; then
                echo "##vso[task.logissue type=error]Docs lint failures detected and breakBuild is enabled"
                exit 1
              else
                echo "##vso[task.logissue type=warning]Docs lint failures detected but breakBuild is disabled"
              fi
            else
              echo "All docs lint checks passed"
            fi

      - task: PublishPipelineArtifact@1
        displayName: 'Publish Docs Lint Results Artifacts'
        condition: always()
        inputs:
          targetPath: '$(Build.SourcesDirectory)/docs-lint-results'
          artifactName: 'docs-lint-results'
        continueOnError: true
