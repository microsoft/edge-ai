# YAML Lint Template
#
# Purpose:
# Validates YAML files, Helm charts, and Dockerfiles for syntax and best practices.
#
# Functionality:
# - yamllint: Validates YAML syntax and formatting
# - Helm lint: Validates Helm chart structure and templates
# - hadolint: Lints Dockerfiles for best practices
# - Publishes lint results as pipeline artifacts
#
# Parameters:
# - breakBuild: Fail the pipeline on lint findings (default: false)
# - dependsOn: Jobs that this job depends on
# - displayName: Display name for the job
# - condition: Condition for running the job
# - agentPool: Azure DevOps agent pool configuration
#
# Usage Examples:
# ```yaml
# - template: .azdo/templates/yaml-lint-template.yml
#
# - template: .azdo/templates/yaml-lint-template.yml
#   parameters:
#     breakBuild: true
#     dependsOn: ['previousJob']
# ```
---
parameters:
  - name: breakBuild
    type: boolean
    default: false
  - name: dependsOn
    type: object
    default: []
  - name: displayName
    type: string
    default: 'YAML Lint'
  - name: condition
    type: string
    default: 'succeeded()'
  - name: agentPool
    type: object
    default:
      name: 'ai-on-edge-managed-pool'
      vmImage: 'ubuntu-latest'

jobs:
  - job: YamlLint
    displayName: ${{ parameters.displayName }}
    dependsOn: ${{ parameters.dependsOn }}
    condition: ${{ parameters.condition }}
    pool: ${{ parameters.agentPool }}
    steps:
      - checkout: self

      # For PR builds, checkout the source branch HEAD instead of merge ref
      - task: Bash@3
        displayName: 'Checkout PR source branch HEAD'
        condition: eq(variables['Build.Reason'], 'PullRequest')
        inputs:
          targetType: 'inline'
          script: |
            BRANCH_NAME=$(echo "$(System.PullRequest.SourceBranch)" | sed 's|^refs/heads/||')
            echo "Switching to PR source branch HEAD: $BRANCH_NAME"
            git checkout "$BRANCH_NAME"
            git log -1 --oneline

      - task: Bash@3
        displayName: 'Install YAML Lint Tools'
        inputs:
          targetType: 'inline'
          script: |
            set -euo pipefail
            mkdir -p yaml-lint-results

            echo "Installing yamllint..."
            pip install --quiet yamllint

            HELM_VERSION="3.16.3"
            echo "Installing Helm v${HELM_VERSION}..."
            curl -sSfL "https://get.helm.sh/helm-v${HELM_VERSION}-linux-amd64.tar.gz" -o helm.tar.gz
            tar -xzf helm.tar.gz linux-amd64/helm
            sudo mv linux-amd64/helm /usr/local/bin/helm
            rm -rf linux-amd64 helm.tar.gz

            HADOLINT_VERSION="2.12.0"
            echo "Installing hadolint v${HADOLINT_VERSION}..."
            curl -sSfL "https://github.com/hadolint/hadolint/releases/download/v${HADOLINT_VERSION}/hadolint-Linux-x86_64" -o hadolint
            chmod +x hadolint
            sudo mv hadolint /usr/local/bin/hadolint

            yamllint --version
            helm version --short
            hadolint --version

      - task: Bash@3
        displayName: 'Run YAML Lint'
        inputs:
          targetType: 'inline'
          script: |
            set -uo pipefail
            LINT_FAILED=false

            echo "=== Running yamllint ==="
            if ! yamllint -f parsable . 2>&1 | tee yaml-lint-results/yamllint-results.txt; then
              LINT_FAILED=true
            fi

            echo "=== Running Helm lint ==="
            CHART_DIRS=$(find src/500-application -name 'Chart.yaml' -exec dirname {} \; 2>/dev/null || true)
            if [ -n "$CHART_DIRS" ]; then
              for chart_dir in $CHART_DIRS; do
                echo "Linting Helm chart: $chart_dir"
                if ! helm lint "$chart_dir" 2>&1 | tee -a yaml-lint-results/helm-lint-results.txt; then
                  LINT_FAILED=true
                fi
              done
            else
              echo "No Helm charts found to lint"
            fi

            echo "=== Running hadolint ==="
            DOCKERFILES=$(find . -name 'Dockerfile' -o -name 'Dockerfile.*' \
              -not -path '*/node_modules/*' \
              -not -path '*/.copilot-tracking/*' \
              -type f 2>/dev/null || true)
            if [ -n "$DOCKERFILES" ]; then
              for dockerfile in $DOCKERFILES; do
                echo "Linting: $dockerfile"
                if ! hadolint "$dockerfile" 2>&1 | tee -a yaml-lint-results/hadolint-results.txt; then
                  LINT_FAILED=true
                fi
              done
            else
              echo "No Dockerfiles found to lint"
            fi

            if [ "$LINT_FAILED" = "true" ]; then
              BREAK_BUILD="${{ parameters.breakBuild }}"
              if [ "$BREAK_BUILD" = "True" ]; then
                echo "##vso[task.logissue type=error]YAML/Helm/Dockerfile lint failures detected and breakBuild is enabled"
                exit 1
              else
                echo "##vso[task.logissue type=warning]YAML/Helm/Dockerfile lint failures detected but breakBuild is disabled"
              fi
            else
              echo "All YAML lint checks passed"
            fi

      - task: PublishPipelineArtifact@1
        displayName: 'Publish YAML Lint Results Artifacts'
        condition: always()
        inputs:
          targetPath: '$(Build.SourcesDirectory)/yaml-lint-results'
          artifactName: 'yaml-lint-results'
        continueOnError: true
