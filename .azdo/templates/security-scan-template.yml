# Security Scanner Template
#
# Purpose:
# Runs security scanning tools (Gitleaks, Grype, Secretlint) to detect secrets,
# vulnerabilities, and sensitive data in the repository.
#
# Functionality:
# - Gitleaks: Detects hardcoded secrets with PR-aware incremental scanning
# - Grype: Scans for known vulnerabilities in project dependencies
# - Secretlint: Identifies sensitive data patterns across all files
# - Publishes combined security results as pipeline artifacts
#
# Parameters:
# - breakBuild: Fail the pipeline on security findings (default: true)
# - dependsOn: Jobs that this job depends on
# - displayName: Display name for the job
# - condition: Condition for running the job
# - agentPool: Azure DevOps agent pool configuration
#
# Usage Examples:
# ```yaml
# - template: .azdo/templates/security-scan-template.yml
#
# - template: .azdo/templates/security-scan-template.yml
#   parameters:
#     breakBuild: false
#     dependsOn: ['previousJob']
# ```
---
parameters:
  - name: breakBuild
    type: boolean
    default: true
  - name: dependsOn
    type: object
    default: []
  - name: displayName
    type: string
    default: 'Security Scan'
  - name: condition
    type: string
    default: 'succeeded()'
  - name: agentPool
    type: object
    default:
      name: 'ai-on-edge-managed-pool'
      vmImage: 'ubuntu-latest'

jobs:
  - job: SecurityScan
    displayName: ${{ parameters.displayName }}
    dependsOn: ${{ parameters.dependsOn }}
    condition: ${{ parameters.condition }}
    pool: ${{ parameters.agentPool }}
    steps:
      - checkout: self
        fetchDepth: 0

      # For PR builds, checkout the source branch HEAD instead of merge ref
      - task: Bash@3
        displayName: 'Checkout PR source branch HEAD'
        condition: eq(variables['Build.Reason'], 'PullRequest')
        inputs:
          targetType: 'inline'
          script: |
            BRANCH_NAME=$(echo "$(System.PullRequest.SourceBranch)" | sed 's|^refs/heads/||')
            echo "Switching to PR source branch HEAD: $BRANCH_NAME"
            git checkout "$BRANCH_NAME"
            git log -1 --oneline

      - task: Bash@3
        displayName: 'Install Security Tools'
        inputs:
          targetType: 'inline'
          script: |
            set -euo pipefail
            mkdir -p security-results

            GITLEAKS_VERSION="8.30.0"
            echo "Installing Gitleaks v${GITLEAKS_VERSION}..."
            curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" -o gitleaks.tar.gz
            tar -xzf gitleaks.tar.gz gitleaks
            sudo mv gitleaks /usr/local/bin/gitleaks
            rm gitleaks.tar.gz
            gitleaks version

            GRYPE_VERSION="0.109.1"
            echo "Installing Grype v${GRYPE_VERSION}..."
            curl -sSfL "https://github.com/anchore/grype/releases/download/v${GRYPE_VERSION}/grype_${GRYPE_VERSION}_linux_amd64.tar.gz" -o grype.tar.gz
            tar -xzf grype.tar.gz grype
            sudo mv grype /usr/local/bin/grype
            rm grype.tar.gz
            grype version

            echo "Installing Secretlint..."
            npm install --no-save secretlint @secretlint/secretlint-rule-preset-recommend

      - task: Bash@3
        displayName: 'Run Gitleaks'
        inputs:
          targetType: 'inline'
          script: |
            set -uo pipefail
            GITLEAKS_FAILED=false

            if [ "$(Build.Reason)" = "PullRequest" ]; then
              echo "Running Gitleaks incremental scan for PR..."
              gitleaks detect \
                --config .gitleaks.toml \
                --report-format sarif \
                --report-path security-results/gitleaks-report.sarif \
                --log-opts "origin/$(System.PullRequest.TargetBranch)..HEAD" \
                --exit-code 1 || GITLEAKS_FAILED=true
            else
              echo "Running Gitleaks full scan..."
              gitleaks detect \
                --config .gitleaks.toml \
                --report-format sarif \
                --report-path security-results/gitleaks-report.sarif \
                --exit-code 1 || GITLEAKS_FAILED=true
            fi

            if [ "$GITLEAKS_FAILED" = "true" ]; then
              echo "##vso[task.logissue type=error]Gitleaks detected secrets in the repository"
              echo "GITLEAKS_FAILED=true" >> security-results/scan-status.env
            else
              echo "Gitleaks scan passed"
              echo "GITLEAKS_FAILED=false" >> security-results/scan-status.env
            fi

      - task: Bash@3
        displayName: 'Run Grype'
        inputs:
          targetType: 'inline'
          script: |
            set -uo pipefail
            GRYPE_FAILED=false

            echo "Running Grype vulnerability scan..."
            grype dir:. --config .grype.yaml 2>&1 | tee security-results/grype-results.txt || GRYPE_FAILED=true

            if [ "$GRYPE_FAILED" = "true" ]; then
              echo "##vso[task.logissue type=error]Grype detected vulnerabilities"
              echo "GRYPE_FAILED=true" >> security-results/scan-status.env
            else
              echo "Grype scan passed"
              echo "GRYPE_FAILED=false" >> security-results/scan-status.env
            fi

      - task: Bash@3
        displayName: 'Run Secretlint'
        inputs:
          targetType: 'inline'
          script: |
            set -uo pipefail
            SECRETLINT_FAILED=false

            echo "Running Secretlint..."
            npx secretlint "**/*" \
              "!**/node_modules/**" \
              "!**/.git/**" \
              "!**/.terraform/**" \
              2>&1 | tee security-results/secretlint-results.txt || SECRETLINT_FAILED=true

            if [ "$SECRETLINT_FAILED" = "true" ]; then
              echo "##vso[task.logissue type=error]Secretlint detected sensitive data"
              echo "SECRETLINT_FAILED=true" >> security-results/scan-status.env
            else
              echo "Secretlint scan passed"
              echo "SECRETLINT_FAILED=false" >> security-results/scan-status.env
            fi

      - task: Bash@3
        displayName: 'Evaluate Security Results'
        inputs:
          targetType: 'inline'
          script: |
            set -euo pipefail
            BREAK_BUILD="${{ parameters.breakBuild }}"
            FAILED=false

            if [ -f security-results/scan-status.env ]; then
              source security-results/scan-status.env
              if [ "${GITLEAKS_FAILED:-false}" = "true" ] || [ "${GRYPE_FAILED:-false}" = "true" ] || [ "${SECRETLINT_FAILED:-false}" = "true" ]; then
                FAILED=true
              fi
            fi

            echo "## Security Scan Summary" >> security-results/summary.md
            echo "- Gitleaks: ${GITLEAKS_FAILED:-unknown}" >> security-results/summary.md
            echo "- Grype: ${GRYPE_FAILED:-unknown}" >> security-results/summary.md
            echo "- Secretlint: ${SECRETLINT_FAILED:-unknown}" >> security-results/summary.md

            if [ "$FAILED" = "true" ] && [ "$BREAK_BUILD" = "True" ]; then
              echo "##vso[task.logissue type=error]Security scan failures detected and breakBuild is enabled"
              exit 1
            elif [ "$FAILED" = "true" ]; then
              echo "##vso[task.logissue type=warning]Security scan failures detected but breakBuild is disabled"
            else
              echo "All security scans passed"
            fi

      - task: PublishPipelineArtifact@1
        displayName: 'Publish Security Results Artifacts'
        condition: always()
        inputs:
          targetPath: '$(Build.SourcesDirectory)/security-results'
          artifactName: 'security-results'
        continueOnError: true
