# Terraform Lint Template
#
# Purpose:
# Validates Terraform configurations using terraform fmt for formatting
# and TFLint for static analysis across the repository.
#
# Functionality:
# - terraform fmt: Validates Terraform formatting consistency
# - TFLint: Static analysis for Terraform best practices and errors
# - Publishes lint results as pipeline artifacts
#
# Parameters:
# - breakBuild: Fail the pipeline on lint findings (default: false)
# - dependsOn: Jobs that this job depends on
# - displayName: Display name for the job
# - condition: Condition for running the job
# - agentPool: Azure DevOps agent pool configuration
#
# Usage Examples:
# ```yaml
# - template: .azdo/templates/terraform-lint-template.yml
#
# - template: .azdo/templates/terraform-lint-template.yml
#   parameters:
#     breakBuild: true
#     dependsOn: ['previousJob']
# ```
---
parameters:
  - name: breakBuild
    type: boolean
    default: false
  - name: dependsOn
    type: object
    default: []
  - name: displayName
    type: string
    default: 'Terraform Lint'
  - name: condition
    type: string
    default: 'succeeded()'
  - name: agentPool
    type: object
    default:
      name: 'ai-on-edge-managed-pool'
      vmImage: 'ubuntu-latest'

jobs:
  - job: TerraformLint
    displayName: ${{ parameters.displayName }}
    dependsOn: ${{ parameters.dependsOn }}
    condition: ${{ parameters.condition }}
    pool: ${{ parameters.agentPool }}
    steps:
      - checkout: self

      # For PR builds, checkout the source branch HEAD instead of merge ref
      - task: Bash@3
        displayName: 'Checkout PR source branch HEAD'
        condition: eq(variables['Build.Reason'], 'PullRequest')
        inputs:
          targetType: 'inline'
          script: |
            BRANCH_NAME=$(echo "$(System.PullRequest.SourceBranch)" | sed 's|^refs/heads/||')
            echo "Switching to PR source branch HEAD: $BRANCH_NAME"
            git checkout "$BRANCH_NAME"
            git log -1 --oneline

      - task: Bash@3
        displayName: 'Install Terraform and TFLint'
        inputs:
          targetType: 'inline'
          script: |
            set -euo pipefail
            mkdir -p terraform-lint-results

            TERRAFORM_VERSION="1.9.8"
            echo "Installing Terraform v${TERRAFORM_VERSION}..."
            curl -fsSL "https://releases.hashicorp.com/terraform/${TERRAFORM_VERSION}/terraform_${TERRAFORM_VERSION}_linux_amd64.zip" -o /tmp/terraform.zip
            unzip -o /tmp/terraform.zip -d /tmp
            sudo mv /tmp/terraform /usr/local/bin/terraform
            rm /tmp/terraform.zip
            terraform --version

            TFLINT_VERSION="v0.54.0"
            TFLINT_SHA256="16d062ebb3d2d199463fb93e17644c27feb57cb6175babecbce3e8d34f4956c6"
            echo "Installing TFLint ${TFLINT_VERSION}..."
            curl -fsSL "https://github.com/terraform-linters/tflint/releases/download/${TFLINT_VERSION}/tflint_linux_amd64.zip" -o /tmp/tflint.zip
            echo "${TFLINT_SHA256}  /tmp/tflint.zip" | sha256sum --check --strict
            unzip -o /tmp/tflint.zip -d /tmp
            sudo mv /tmp/tflint /usr/local/bin/tflint
            rm /tmp/tflint.zip
            tflint --version

      - task: Bash@3
        displayName: 'Run Terraform Lint'
        inputs:
          targetType: 'inline'
          script: |
            set -uo pipefail
            LINT_FAILED=false

            echo "=== Running terraform fmt -check ==="
            if ! terraform fmt -check -diff -recursive > terraform-lint-results/terraform-fmt-output.txt 2>&1; then
              echo "##vso[task.logissue type=warning]Terraform formatting issues detected"
              cat terraform-lint-results/terraform-fmt-output.txt
              LINT_FAILED=true
            else
              echo "terraform fmt check passed"
              cat terraform-lint-results/terraform-fmt-output.txt
            fi

            echo "=== Running TFLint ==="
            TFLINT_CONFIG="$(pwd)/.tflint.hcl"
            tflint --init --config "$TFLINT_CONFIG"
            if ! tflint --recursive --config "$TFLINT_CONFIG" > terraform-lint-results/tflint-output.txt 2>&1; then
              echo "##vso[task.logissue type=warning]TFLint issues detected"
              cat terraform-lint-results/tflint-output.txt
              LINT_FAILED=true
            else
              echo "TFLint check passed"
              cat terraform-lint-results/tflint-output.txt
            fi

            if [ "$LINT_FAILED" = "true" ]; then
              BREAK_BUILD="${{ parameters.breakBuild }}"
              if [ "$BREAK_BUILD" = "True" ]; then
                echo "##vso[task.logissue type=error]Terraform lint failures detected and breakBuild is enabled"
                exit 1
              else
                echo "##vso[task.logissue type=warning]Terraform lint failures detected but breakBuild is disabled"
              fi
            else
              echo "All Terraform lint checks passed"
            fi

      - task: PublishPipelineArtifact@1
        displayName: 'Publish Terraform Lint Results Artifacts'
        condition: always()
        inputs:
          targetPath: '$(Build.SourcesDirectory)/terraform-lint-results'
          artifactName: 'terraform-lint-results'
        continueOnError: true
