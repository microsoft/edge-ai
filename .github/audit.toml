# cargo-audit allow-list (loaded via `cargo audit -c .github/audit.toml`)
#
# Each entry below is an unmaintained or unsound transitive that cannot be
# dropped without an upstream release of a direct dependency. Re-evaluate
# whenever direct dependencies are bumped.

[advisories]
ignore = [
  "RUSTSEC-2024-0384", # instant: unmaintained; pulled by parking_lot 0.11 chain via legacy deps
  "RUSTSEC-2024-0436", # paste: unmaintained; pulled by ONNX / candle stack
  "RUSTSEC-2025-0134", # rustls-pemfile: unmaintained 1.x; pulled by hyper-rustls transitive
  "RUSTSEC-2026-0097", # rand: unsound with custom logger; awaiting upstream release
  "RUSTSEC-2026-0105", # core2: unmaintained transitive via apache-avro 0.17 -> libflate 2.2.1 (avro-to-json operator); awaiting upstream release. Pre-existing on main; out of scope for PR #411 (Issue #362 PowerShell-only).
]

[yanked]
# core2 yanked release pulled transitively by avro-to-json operator stack;
# remove once upstream republishes a non-yanked version.
enabled = false
