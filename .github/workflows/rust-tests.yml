---
name: rust-tests

on:
  workflow_call:

permissions:
  contents: read
  id-token: write

jobs:
  coverage:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        crate:
          - src/500-application/503-media-capture-service/services/media-capture-service
          - src/500-application/507-ai-inference/services/ai-edge-inference
          - src/500-application/507-ai-inference/services/ai-edge-inference-crate
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Rust toolchain
        shell: bash
        run: |
          rustup toolchain install stable --profile minimal --component llvm-tools-preview
          rustup default stable

      - name: Cache cargo registry and build
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ${{ matrix.crate }}/target
          key: ${{ runner.os }}-cargo-${{ matrix.crate }}-${{ hashFiles(format('{0}/Cargo.lock', matrix.crate), format('{0}/Cargo.toml', matrix.crate)) }}
          restore-keys: |
            ${{ runner.os }}-cargo-${{ matrix.crate }}-

      - name: Install cargo-llvm-cov
        shell: bash
        run: cargo install cargo-llvm-cov --locked

      - name: Generate Cobertura coverage
        working-directory: ${{ matrix.crate }}
        run: cargo llvm-cov --cobertura --output-path coverage.xml

      - name: Upload to Codecov
        if: success()
        uses: codecov/codecov-action@3f20e214133d0983f9a10f3d63b0faf9241a3daa # v6.0.0
        with:
          files: ${{ matrix.crate }}/coverage.xml
          use_oidc: true
          fail_ci_if_error: false
          verbose: true
          flags: rust
          name: rust-coverage-${{ matrix.crate }}
