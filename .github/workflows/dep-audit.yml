# Dependency Audit Workflow
#
# Purpose:
# Reusable workflow that runs cargo-audit on every Rust service crate and
# govulncheck on every Go module under the repository. Surfaces known
# RUSTSEC / GHSA advisories for transitive dependencies so we can patch or
# allow-list them deliberately.
#
# Allow-listing:
# Each Rust service may carry a `.cargo/audit.toml` whose `[advisories].ignore`
# array documents accepted unmaintained / unsound transitives that cannot be
# dropped without an upstream release. cargo-audit honours that file
# automatically when invoked from the crate directory.
#
# Parameters:
# - break-build: When true, advisories fail the workflow (default: true).
#
# Usage Examples:
# ```yaml
# # Basic usage in a caller workflow:
# dep-audit:
#   uses: ./.github/workflows/dep-audit.yml
#
# # With break-build disabled:
# dep-audit:
#   uses: ./.github/workflows/dep-audit.yml
#   with:
#     break-build: false
# ```
---
name: Dependency Audit

on:  # yamllint disable-line rule:truthy
  workflow_call:
    inputs:
      break-build:
        description: 'Fail the workflow if advisories are found'
        required: false
        type: boolean
        default: true

permissions:
  contents: read

jobs:
  cargo-audit:
    name: Cargo Audit (Rust)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98 # v4.2.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install Rust toolchain
        shell: bash
        run: |
          RUSTUP_DIR=$(mktemp -d)
          RUSTUP_INIT="${RUSTUP_DIR}/rustup-init"
          RUSTUP_HASH=$(mktemp)
          RUSTUP_URL="https://static.rust-lang.org/rustup/dist/x86_64-unknown-linux-gnu/rustup-init"
          curl --proto '=https' --tlsv1.2 -sSf "${RUSTUP_URL}" -o "${RUSTUP_INIT}"
          curl --proto '=https' --tlsv1.2 -sSf "${RUSTUP_URL}.sha256" -o "${RUSTUP_HASH}"
          echo "$(awk '{print $1}' "${RUSTUP_HASH}")  ${RUSTUP_INIT}" | sha256sum -c -
          chmod +x "${RUSTUP_INIT}"
          "${RUSTUP_INIT}" -y --default-toolchain stable
          rm -rf "${RUSTUP_DIR}" "${RUSTUP_HASH}"
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - name: Install cargo-audit
        shell: bash
        run: |
          export PATH="$HOME/.cargo/bin:$PATH"
          cargo install cargo-audit --locked --version ^0.22

      - name: Run cargo audit on every Rust crate
        shell: bash
        env:
          BREAK_BUILD: ${{ inputs.break-build }}
        run: |
          set -euo pipefail
          export PATH="$HOME/.cargo/bin:$PATH"
          FAILED=0
          while IFS= read -r -d '' lockfile; do
            crate_dir=$(dirname "${lockfile}")
            echo "::group::cargo audit: ${crate_dir}"
            (cd "${crate_dir}" && cargo audit --deny warnings) || FAILED=1
            echo "::endgroup::"
          done < <(find . -name "Cargo.lock" -not -path "*/target/*" -not -path "*/node_modules/*" -print0)
          if [[ "${FAILED}" -ne 0 ]]; then
            if [[ "${BREAK_BUILD}" == "true" ]]; then
              echo "::error::cargo audit found advisories in one or more crates"
              exit 1
            else
              echo "::warning::cargo audit found advisories in one or more crates"
            fi
          fi

  govulncheck:
    name: govulncheck (Go)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98 # v4.2.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version: 'stable'
          cache: false

      - name: Install govulncheck
        shell: bash
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          echo "$HOME/go/bin" >> "$GITHUB_PATH"

      - name: Run govulncheck on every Go module
        shell: bash
        env:
          BREAK_BUILD: ${{ inputs.break-build }}
        run: |
          set -euo pipefail
          export PATH="$HOME/go/bin:$PATH"
          FAILED=0
          while IFS= read -r -d '' gomod; do
            mod_dir=$(dirname "${gomod}")
            echo "::group::govulncheck: ${mod_dir}"
            (cd "${mod_dir}" && govulncheck ./...) || FAILED=1
            echo "::endgroup::"
          done < <(find . -name "go.mod" -not -path "./node_modules/*" -print0)
          if [[ "${FAILED}" -ne 0 ]]; then
            if [[ "${BREAK_BUILD}" == "true" ]]; then
              echo "::error::govulncheck found vulnerabilities in one or more modules"
              exit 1
            else
              echo "::warning::govulncheck found vulnerabilities in one or more modules"
            fi
          fi
