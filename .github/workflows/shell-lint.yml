# Shell Lint
#
# Purpose:
# Reusable workflow that runs bash syntax checking, ShellCheck, and shfmt
# on all shell scripts in the repository.
#
# Parameters:
# - soft-fail: When true, lint violations are reported but do not fail the workflow (default: false)
#
# Usage Examples:
# ```yaml
# # Basic usage:
# shell-lint:
#   uses: ./.github/workflows/shell-lint.yml
#
# # With soft-fail:
# shell-lint:
#   uses: ./.github/workflows/shell-lint.yml
#   with:
#     soft-fail: true
# ```
---
name: Shell Lint

on:  # yamllint disable-line rule:truthy
  workflow_call:
    inputs:
      soft-fail:
        description: 'Whether to continue on lint violations'
        required: false
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  shell-lint:
    name: Shell Lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout Repository
        uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98 # v4.2.2
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Bash syntax check
        id: bash-syntax
        run: |
          FAILED=0
          while IFS= read -r -d '' file; do
            if ! bash -n "$file" 2>/dev/null; then
              echo "::error file=${file}::Bash syntax error in ${file}"
              FAILED=1
            fi
          done < <(find . -name '*.sh' -not -path './node_modules/*' -not -path './.copilot-tracking/*' -print0)
          if [ "$FAILED" -ne 0 ]; then
            echo "BASH_SYNTAX_FAILED=true" >> "$GITHUB_ENV"
          fi

      - name: Run ShellCheck
        id: shellcheck
        run: |
          find . -name '*.sh' -not -path './node_modules/*' -not -path './.copilot-tracking/*' \
            | xargs shellcheck --rcfile .shellcheckrc --format=gcc > shellcheck-output.txt 2>&1 || echo "SHELLCHECK_FAILED=true" >> "$GITHUB_ENV"
          cat shellcheck-output.txt
        continue-on-error: true

      - name: Run shfmt check
        id: shfmt
        run: |
          find . -name '*.sh' -not -path './node_modules/*' -not -path './.copilot-tracking/*' \
            | xargs shfmt --diff > shfmt-output.txt 2>&1 || echo "SHFMT_FAILED=true" >> "$GITHUB_ENV"
          cat shfmt-output.txt
        continue-on-error: true

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v4.4.3
        with:
          name: shell-lint-results
          path: |
            shellcheck-output.txt
            shfmt-output.txt
          retention-days: 30

      - name: Add job summary
        if: always()
        run: |
          echo "## Shell Lint Results" >> "$GITHUB_STEP_SUMMARY"
          if [ "$BASH_SYNTAX_FAILED" == "true" ] || [ "$SHELLCHECK_FAILED" == "true" ] || [ "$SHFMT_FAILED" == "true" ]; then
            echo "| Check | Status |" >> "$GITHUB_STEP_SUMMARY"
            echo "|-------|--------|" >> "$GITHUB_STEP_SUMMARY"
            if [ "$BASH_SYNTAX_FAILED" == "true" ]; then
              echo "| Bash Syntax | :x: Failed |" >> "$GITHUB_STEP_SUMMARY"
            else
              echo "| Bash Syntax | :white_check_mark: Passed |" >> "$GITHUB_STEP_SUMMARY"
            fi
            if [ "$SHELLCHECK_FAILED" == "true" ]; then
              echo "| ShellCheck | :x: Failed |" >> "$GITHUB_STEP_SUMMARY"
            else
              echo "| ShellCheck | :white_check_mark: Passed |" >> "$GITHUB_STEP_SUMMARY"
            fi
            if [ "$SHFMT_FAILED" == "true" ]; then
              echo "| shfmt | :x: Failed |" >> "$GITHUB_STEP_SUMMARY"
            else
              echo "| shfmt | :white_check_mark: Passed |" >> "$GITHUB_STEP_SUMMARY"
            fi
          else
            echo ":white_check_mark: **Status**: All checks passed" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Fail job if violations found
        if: (env.BASH_SYNTAX_FAILED == 'true' || env.SHELLCHECK_FAILED == 'true' || env.SHFMT_FAILED == 'true') && inputs.soft-fail == false
        run: exit 1
