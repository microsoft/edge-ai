# PowerShell Lint
#
# Purpose:
# Reusable workflow that runs PSScriptAnalyzer on all PowerShell files.
#
# Parameters:
# - soft-fail: When true, lint violations are reported but do not fail the workflow (default: false)
#
# Usage Examples:
# ```yaml
# # Basic usage:
# powershell-lint:
#   uses: ./.github/workflows/powershell-lint.yml
#
# # With soft-fail:
# powershell-lint:
#   uses: ./.github/workflows/powershell-lint.yml
#   with:
#     soft-fail: true
# ```
---
name: PowerShell Lint

on:  # yamllint disable-line rule:truthy
  workflow_call:
    inputs:
      soft-fail:
        description: 'Whether to continue on lint violations'
        required: false
        type: boolean
        default: false

permissions: {}

jobs:
  powershell-lint:
    name: PowerShell Lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout Repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Run PSScriptAnalyzer
        id: lint
        shell: pwsh
        run: |
          ./scripts/linting/Invoke-PSScriptAnalyzer.ps1 -SoftFail:$${{ inputs.soft-fail == 'true' }}

      - name: Upload Lint Results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: powershell-lint-results
          path: lint-results/
          retention-days: 30
