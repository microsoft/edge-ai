# PowerShell Lint
#
# Purpose:
# Reusable workflow that runs PSScriptAnalyzer on all PowerShell files.
#
# Parameters:
# - soft-fail: When true, lint violations are reported but do not fail the workflow (default: false)
#
# Usage Examples:
# ```yaml
# # Basic usage:
# powershell-lint:
#   uses: ./.github/workflows/powershell-lint.yml
#
# # With soft-fail:
# powershell-lint:
#   uses: ./.github/workflows/powershell-lint.yml
#   with:
#     soft-fail: true
# ```
---
name: PowerShell Lint

on:  # yamllint disable-line rule:truthy
  workflow_call:
    inputs:
      soft-fail:
        description: 'Whether to continue on lint violations'
        required: false
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  powershell-lint:
    name: PowerShell Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Run PSScriptAnalyzer
        id: lint
        shell: pwsh
        run: |
          ./scripts/linting/Invoke-PSScriptAnalyzer.ps1 -SoftFail:$${{ inputs.soft-fail == 'true' }}

      - name: Upload Lint Results
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: powershell-lint-results
          path: lint-results/
          retention-days: 30
