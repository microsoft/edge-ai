# Main Branch CI/CD Workflow
#
# Purpose:
# This workflow runs the continuous integration and deployment pipeline for the
# main branch,
# ensuring code quality and deploying documentation to GitHub Pages.
#
# Functionality:
# - Runs per-tool lint workflows for static code analysis across multiple languages
# - Validates documentation standards and updates docs if needed
# - When code is pushed to the main branch (triggers deployment to
#   GitHub Pages)
# - Checks Azure IoT Operations component versions against latest published releases
# - Performs matrix-based validation of Terraform configurations
#
# Parameters:
# None - This workflow is triggered automatically on pushes to main branch
#
# Output Variables:
# None - Results are provided as GitHub checks, annotations, and artifacts
#
# Usage Examples:
# This workflow is automatically triggered on pushes to main branch and doesn't need manual invocation.
#
# This workflow helps maintain code quality on the main branch and keeps documentation
# up-to-date for users of the repository.
---
name: Main Branch CI/CD

permissions:
  contents: read
  actions: read
  checks: write
  pull-requests: write
  statuses: write
  security-events: write

on: # yamllint disable-line rule:truthy
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  # CodeQL Analysis job for code security scanning
  codeql-analysis:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read

    strategy:
      fail-fast: false
      matrix:
        language: ['javascript', 'python', 'typescript', 'csharp']
        # CodeQL supports these languages: https://aka.ms/codeql-docs/language-support

    steps:
      - name: Checkout Repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Initialize CodeQL
        uses: github/codeql-action/init@603b797f8b14b413fe025cd935a91c16c4782713 # v3.33.0
        with:
          languages: ${{ matrix.language }}
          build-mode: none
          # If you wish to specify custom queries, you can do so here or in a
          # config file.
          # By default, queries listed here will override any specified in a config file.
          # For more details, see: https://docs.github.com/en/code-security/code-scanning/automatically-scanning-your-code-for-vulnerabilities-and-errors/configuring-code-scanning#using-queries-in-ql-packs
          # queries: security-extended,security-and-quality

      - name: Autobuild
        uses: github/codeql-action/autobuild@603b797f8b14b413fe025cd935a91c16c4782713 # v3.33.0

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@603b797f8b14b413fe025cd935a91c16c4782713 # v3.33.0
        with:
          category: "/language:${{matrix.language}}"

  # Dependency scanning job for main branch
  dependency-scan-main:
    name: Dependency Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      # GitHub doesn't have a direct equivalent to Azure's ComponentGovernanceComponentDetection
      # Using a basic dependency check with built-in security scanning
      - name: Dependency Review
        uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48 # v4.9.0
        with:
          head-ref: refs/heads/main
          base-ref: refs/heads/main

  # Shell script linting (main)
  shell-lint-main:
    name: Shell Lint
    permissions:
      contents: read
    uses: ./.github/workflows/shell-lint.yml

  # Terraform linting (main)
  terraform-lint-main:
    name: Terraform Lint
    permissions:
      contents: read
    uses: ./.github/workflows/terraform-lint.yml

  # Bicep linting (main)
  bicep-lint-main:
    name: Bicep Lint
    permissions:
      contents: read
    uses: ./.github/workflows/bicep-lint.yml

  # Documentation linting (main)
  docs-lint-main:
    name: Documentation Lint
    permissions:
      contents: read
    uses: ./.github/workflows/docs-lint.yml

  # Code quality checks (main)
  code-quality-lint-main:
    name: Code Quality Lint
    permissions:
      contents: read
    uses: ./.github/workflows/code-quality-lint.yml

  # PowerShell linting (main)
  powershell-lint-main:
    name: PowerShell Lint
    permissions:
      contents: read
    uses: ./.github/workflows/powershell-lint.yml

  # Security scanning (main)
  security-scan-main:
    name: Security Scan
    permissions:
      contents: read
      security-events: write
    uses: ./.github/workflows/security-scan.yml

  # YAML and container linting (main)
  yaml-lint-main:
    name: YAML Lint
    permissions:
      contents: read
    uses: ./.github/workflows/yaml-lint.yml

  # Call docs-check-terraform workflow
  docs-check-terraform-main:
    name: Terraform Documentation Check
    permissions:
      contents: read
    uses: ./.github/workflows/docs-check-terraform.yml
    with:
      break_build: false
    secrets: inherit

  # Call docs-check-bicep workflow
  docs-check-bicep-main:
    name: Bicep Documentation Check
    permissions:
      contents: read
    uses: ./.github/workflows/docs-check-bicep.yml
    with:
      break_build: false
    secrets: inherit

  # Security monitoring job for main branch
  security-monitoring:
    name: Security Monitoring
    permissions:
      contents: read
      security-events: write
      actions: read
    uses: ./.github/workflows/security-comprehensive.yml
    secrets: inherit

  # Pages deployment for main branch (replaces wiki update)
  deploy-pages-main:
    name: Deploy Documentation (Main)
    needs: [docs-check-terraform-main, docs-check-bicep-main, security-monitoring]
    permissions:
      pages: write
      contents: read
      id-token: write
    # Only deploy if there are documentation changes
    if: success()
    uses: ./.github/workflows/pages-deploy.yml
    with:
      source_branch: main
      deploy_environment: production
    secrets: inherit
