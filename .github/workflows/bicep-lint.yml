# Bicep Lint Workflow
#
# Purpose:
# Reusable workflow that validates all Bicep files using az bicep build
# against the repository root bicepconfig.json.
#
# Parameters:
# - soft-fail: When true, lint violations are reported but do not fail the workflow (default: false)
#
# Usage Examples:
# ```yaml
# # Basic usage:
# bicep-lint:
#   uses: ./.github/workflows/bicep-lint.yml
#
# # With soft-fail:
# bicep-lint:
#   uses: ./.github/workflows/bicep-lint.yml
#   with:
#     soft-fail: true
# ```
---
name: Bicep Lint

on:  # yamllint disable-line rule:truthy
  workflow_call:
    inputs:
      soft-fail:
        description: 'Whether to continue on lint violations'
        required: false
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  bicep-lint:
    name: Bicep Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Azure CLI with Bicep
        shell: bash
        run: |
          set -euo pipefail
          if ! command -v az &>/dev/null; then
            echo "Azure CLI is not installed. Installing now..."
            # Pin Azure CLI install via Microsoft apt keyring/repo and explicit version (OSSF Scorecard pinned-dependencies)
            AZ_CLI_INSTALL_VER="${AZ_CLI_VER:-2.67.0}"
            sudo apt-get update
            sudo apt-get install -y ca-certificates curl apt-transport-https lsb-release gnupg
            sudo mkdir -p /etc/apt/keyrings
            curl -sLS https://packages.microsoft.com/keys/microsoft.asc \
              | gpg --dearmor \
              | sudo tee /etc/apt/keyrings/microsoft.gpg >/dev/null
            sudo chmod go+r /etc/apt/keyrings/microsoft.gpg
            AZ_REPO="$(lsb_release -cs)"
            echo "deb [arch=amd64 signed-by=/etc/apt/keyrings/microsoft.gpg] https://packages.microsoft.com/repos/azure-cli/ ${AZ_REPO} main" \
              | sudo tee /etc/apt/sources.list.d/azure-cli.list >/dev/null
            sudo apt-get update
            sudo apt-get install -y "azure-cli=${AZ_CLI_INSTALL_VER}-1~${AZ_REPO}"
          fi
          az bicep install
          az bicep version

      - name: Find and validate Bicep files
        id: bicep-build
        shell: bash
        run: |
          set -euo pipefail
          FAILED=0
          FILES_CHECKED=0
          FAILURES=""

          while IFS= read -r -d '' file; do
            if [[ "$file" == *node_modules* ]] || [[ "$file" == *.copilot-tracking* ]]; then
              continue
            fi
            FILES_CHECKED=$((FILES_CHECKED + 1))
            echo "::group::Validating: $file"
            if ! az bicep build --file "$file" --stdout > /dev/null 2>&1; then
              FAILED=$((FAILED + 1))
              FAILURES="${FAILURES}\n- ${file}"
              echo "::error file=${file}::Bicep build failed for ${file}"
              az bicep build --file "$file" --stdout 2>&1 || true
            fi
            echo "::endgroup::"
          done < <(find . -name '*.bicep' -print0)

          echo "files-checked=${FILES_CHECKED}" >> "$GITHUB_OUTPUT"
          echo "failures=${FAILED}" >> "$GITHUB_OUTPUT"

          SUMMARY="## Bicep Lint Results\n\n- **Files checked:** ${FILES_CHECKED}\n- **Failures:** ${FAILED}"
          if [ "$FAILED" -gt 0 ]; then
            SUMMARY="${SUMMARY}\n\n### Failed files\n${FAILURES}"
          fi
          echo -e "$SUMMARY" >> "$GITHUB_STEP_SUMMARY"
          echo -e "$SUMMARY" > bicep-lint-output.txt

          if [ "$FAILED" -gt 0 ]; then
            echo "BICEP_LINT_FAILED=true" >> "$GITHUB_ENV"
          fi

      - name: Upload lint results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: bicep-lint-results-${{ github.run_id }}
          path: bicep-lint-output.txt
          retention-days: 30
          if-no-files-found: ignore

      - name: Fail on violations
        if: env.BICEP_LINT_FAILED == 'true'
        shell: bash
        env:
          SOFT_FAIL: ${{ inputs.soft-fail }}
        run: |
          if [ "$SOFT_FAIL" = "true" ]; then
            echo "::warning::Bicep lint found violations (soft-fail enabled)"
          else
            echo "::error::Bicep lint found violations"
            exit 1
          fi
