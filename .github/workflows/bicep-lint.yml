# Bicep Lint Workflow
#
# Purpose:
# Reusable workflow that validates all Bicep files using az bicep build
# against the repository root bicepconfig.json.
#
# Parameters:
# - soft-fail: When true, lint violations are reported but do not fail the workflow (default: false)
# - full-validation: When true, validates every Bicep file in the repository (default: true)
# - bicep-folders-json: JSON object emitted by matrix-folder-check for scoped validation
#
# Usage Examples:
# ```yaml
# # Basic usage:
# bicep-lint:
#   uses: ./.github/workflows/bicep-lint.yml
#
# # With soft-fail:
# bicep-lint:
#   uses: ./.github/workflows/bicep-lint.yml
#   with:
#     soft-fail: true
# ```
---
name: Bicep Lint

on:  # yamllint disable-line rule:truthy
  workflow_call:
    inputs:
      soft-fail:
        description: 'Whether to continue on lint violations'
        required: false
        type: boolean
        default: false
      full-validation:
        description: 'Whether to validate every Bicep file in the repository'
        required: false
        type: boolean
        default: true
      bicep-folders-json:
        description: 'JSON object of Bicep folders to validate when full-validation is false'
        required: false
        type: string
        default: '{}'

permissions: {}

jobs:
  bicep-lint:
    name: Bicep Lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout Repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Azure CLI with Bicep
        shell: bash
        run: |
          set -euo pipefail
          if ! command -v az &>/dev/null; then
            echo "Azure CLI is not installed. Installing now..."
            # Pin Azure CLI install via Microsoft apt keyring/repo and explicit version (OSSF Scorecard pinned-dependencies)
            AZ_CLI_INSTALL_VER="${AZ_CLI_VER:-2.67.0}"
            sudo apt-get update
            sudo apt-get install -y ca-certificates curl apt-transport-https lsb-release gnupg
            sudo mkdir -p /etc/apt/keyrings
            curl -sLS https://packages.microsoft.com/keys/microsoft.asc \
              | gpg --dearmor \
              | sudo tee /etc/apt/keyrings/microsoft.gpg >/dev/null
            sudo chmod go+r /etc/apt/keyrings/microsoft.gpg
            AZ_REPO="$(lsb_release -cs)"
            echo "deb [arch=amd64 signed-by=/etc/apt/keyrings/microsoft.gpg] https://packages.microsoft.com/repos/azure-cli/ ${AZ_REPO} main" \
              | sudo tee /etc/apt/sources.list.d/azure-cli.list >/dev/null
            sudo apt-get update
            sudo apt-get install -y "azure-cli=${AZ_CLI_INSTALL_VER}-1~${AZ_REPO}"
          fi
          az bicep install
          az bicep version

      - name: Find and validate Bicep files
        id: bicep-build
        shell: pwsh
        env:
          BICEP_FOLDERS_JSON: ${{ inputs.bicep-folders-json }}
          FULL_VALIDATION: ${{ inputs.full-validation }}
        run: |
          ./scripts/build/Invoke-BicepLint.ps1 `
            -Platform github `
            -FullValidation $env:FULL_VALIDATION `
            -BicepFoldersJson $env:BICEP_FOLDERS_JSON `
            -ResultsDir bicep-lint-results `
            -OutputFile bicep-lint-output.txt

      - name: Upload lint results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: bicep-lint-results-${{ github.run_id }}
          path: bicep-lint-output.txt
          retention-days: 30
          if-no-files-found: ignore

      - name: Fail on violations
        if: steps.bicep-build.outputs.failures != '0'
        shell: pwsh
        env:
          SOFT_FAIL: ${{ inputs.soft-fail }}
        run: |
          if ($env:SOFT_FAIL -eq 'true') {
            Write-Output '::warning::Bicep lint found violations (soft-fail enabled)'
          }
          else {
            Write-Output '::error::Bicep lint found violations'
            exit 1
          }
