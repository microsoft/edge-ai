# Docusaurus GitHub Pages Deployment Workflow
# Builds and deploys the Docusaurus site at docs/docusaurus/ to GitHub Pages.
# Reusable workflow invoked via workflow_call.

name: Deploy to GitHub Pages

on:
  workflow_call:
    inputs:
      source_branch:
        description: 'Branch to deploy from'
        required: false
        type: string
        default: 'main'
      deploy_environment:
        description: 'Deployment environment name'
        required: false
        type: string
        default: 'github-pages'
    outputs:
      page_url:
        description: 'The deployed GitHub Pages URL'
        value: ${{ jobs.deploy.outputs.page_url }}

permissions:
  contents: read
  pages: write
  id-token: write
  attestations: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  test:
    uses: ./.github/workflows/docusaurus-tests.yml
    with:
      soft-fail: false

  build:
    name: Build Docusaurus Site
    needs: [test]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.source_branch }}

      - name: Configure GitHub Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v4.3.0
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: docs/docusaurus/package-lock.json

      - name: Install dependencies
        working-directory: docs/docusaurus
        run: npm ci

      - name: Build Docusaurus site
        working-directory: docs/docusaurus
        run: npm run build

      - name: Verify build output
        working-directory: docs/docusaurus
        run: |
          echo "=== Build Output Verification ==="
          if [ ! -f "build/index.html" ]; then
            echo "ERROR: build/index.html not found"
            exit 1
          fi
          echo "Build output contains $(find build -type f | wc -l) files"
          echo "Build directory size: $(du -sh build | cut -f1)"
          echo "Build verification passed"

      - name: Create build artifact archive
        run: tar -czf site-artifact.tar.gz -C docs/docusaurus/build .

      - name: Upload build artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: documentation-build-${{ github.run_number }}
          path: site-artifact.tar.gz
          retention-days: 30

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: docs/docusaurus/build

  attest-documentation:
    needs: [build]
    if: inputs.deploy_environment == 'production'
    runs-on: ubuntu-latest
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: documentation-build-${{ github.run_number }}
          path: ./attestation-staging

      - name: Attest build provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: ./attestation-staging/**

      - name: Sparse checkout for SBOM config
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          sparse-checkout: |
            .syft.yaml
          sparse-checkout-cone-mode: false

      - name: Generate SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          artifact-name: documentation-sbom-${{ github.run_number }}
          output-file: documentation-sbom.spdx.json
          format: spdx-json
          config: .syft.yaml

      - name: Attest SBOM
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          subject-path: documentation-sbom.spdx.json
          predicate-type: https://spdx.dev/Document/v2.3
          predicate-path: documentation-sbom.spdx.json

  deploy:
    name: Deploy to GitHub Pages
    environment:
      name: ${{ inputs.deploy_environment }}
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: [build, attest-documentation]
    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0

      - name: Verify deployment
        run: |
          echo "=== Deployment Verification ==="
          SITE_URL="${{ steps.deployment.outputs.page_url }}"
          echo "Deployed to: ${SITE_URL}"

          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${SITE_URL}" || echo "000")
          if [ "$STATUS" -ge 200 ] && [ "$STATUS" -lt 400 ]; then
            echo "Site is accessible (HTTP ${STATUS})"
          else
            echo "WARNING: Site returned HTTP ${STATUS}"
          fi

          CONTENT=$(curl -sL "${SITE_URL}" || echo "")
          if echo "$CONTENT" | grep -q '<div id="__docusaurus"'; then
            echo "Docusaurus root element found"
          else
            echo "WARNING: Docusaurus root element not detected"
          fi
          echo "Deployment verification complete"
