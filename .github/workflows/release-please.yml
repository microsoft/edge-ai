---
name: Release Please
# PAI 1+6 parity: branch protection on main requires the pr-validation aggregator,
# so CI gating happens before merge rather than via inline `uses:` calls here.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-please-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      upload_url: ${{ steps.release.outputs.upload_url }}
      body: ${{ steps.release.outputs.body }}
    steps:
      - uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        id: app-token
        with:
          client-id: ${{ vars.RELEASE_APP_CLIENT_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}

      - uses: chainguard-dev/actions/setup-gitsign@v0.13.0

      - uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        id: release
        with:
          token: ${{ steps.app-token.outputs.token }}
          config-file: release-please-config.json
          manifest-file: release-please-manifest.json

  generate-dependency-sbom:
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}
          fetch-depth: 0

      - uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          format: spdx-json
          output-file: dep-sbom.spdx.json
          upload-artifact: false
          upload-release-assets: false

      - id: attest-sbom
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          subject-path: dep-sbom.spdx.json
          predicate-type: https://spdx.dev/Document/v2.3
          predicate-path: dep-sbom.spdx.json

      - name: Extract DSSE envelope
        run: jq '.dsseEnvelope' "${{ steps.attest-sbom.outputs.bundle-path }}" > dep-sbom.intoto.jsonl

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dep-sbom
          path: |
            dep-sbom.spdx.json
            dep-sbom.intoto.jsonl
          if-no-files-found: error

      - name: Attach SBOM to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ needs.release-please.outputs.tag_name }}" \
            dep-sbom.spdx.json dep-sbom.intoto.jsonl --clobber

  attest-release:
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}

      - name: Stage release source tarball
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.release-please.outputs.tag_name }}
        run: |
          mkdir -p release-artifacts
          gh api "repos/${{ github.repository }}/tarball/${TAG}" \
            > "release-artifacts/source-${TAG}.tar.gz"

      - id: provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: 'release-artifacts/*'

      - name: Extract DSSE envelope
        run: jq '.dsseEnvelope' "${{ steps.provenance.outputs.bundle-path }}" > release.intoto.jsonl

      - name: Attach provenance to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.release-please.outputs.tag_name }}
        run: |
          gh release upload "${TAG}" \
            release-artifacts/source-${TAG}.tar.gz release.intoto.jsonl --clobber

  sbom-diff:
    needs: [release-please, generate-dependency-sbom]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dep-sbom
          path: current-sbom

      - name: Fetch previous release SBOM
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.release-please.outputs.tag_name }}
        run: |
          mkdir -p previous-sbom
          prev=$(gh release list --limit 10 --json tagName \
            --jq "[.[] | select(.tagName != \"${TAG}\")][0].tagName // empty")
          if [ -n "$prev" ]; then
            gh release download "$prev" --pattern 'dep-sbom.spdx.json' \
              --dir previous-sbom || true
          fi

      - name: Diff SBOMs
        run: |
          if [ -f previous-sbom/dep-sbom.spdx.json ]; then
            diff -u previous-sbom/dep-sbom.spdx.json current-sbom/dep-sbom.spdx.json \
              > sbom-diff.txt || true
          else
            printf 'No previous SBOM available; this is the baseline release.\n' > sbom-diff.txt
          fi

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sbom-diff
          path: sbom-diff.txt
          if-no-files-found: error

  append-verification-notes:
    needs: [release-please, attest-release, sbom-diff]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: sbom-diff
          path: sbom-diff

      - name: Compose and apply verification appendix
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.release-please.outputs.tag_name }}
          OWNER: ${{ github.repository_owner }}
        run: |
          {
            printf '## Verification\n\n'
            printf 'Verify the signed tag:\n\n'
            printf '```sh\n'
            printf 'git fetch --tags\n'
            printf "gitsign verify --certificate-identity-regexp '.*' --certificate-oidc-issuer 'https://token.actions.githubusercontent.com' %s\n" "$TAG"
            printf '```\n\n'
            printf 'Verify a downloaded artifact attestation:\n\n'
            printf '```sh\n'
            printf 'gh attestation verify <artifact> --owner %s\n' "$OWNER"
            printf '```\n\n'
            printf '### SBOM diff (vs previous release)\n\n'
            printf '```diff\n'
            cat sbom-diff/sbom-diff.txt
            printf '```\n'
          } > notes-appendix.md
          gh release view "$TAG" --json body --jq .body > existing-body.md || true
          cat existing-body.md notes-appendix.md > merged-body.md
          gh release edit "$TAG" --notes-file merged-body.md

  publish-release:
    needs: [release-please, attest-release, sbom-diff, append-verification-notes]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Flip release draft to published
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.release-please.outputs.tag_name }}
        run: gh release edit "$TAG" --draft=false

  close-milestone:
    needs: [release-please, publish-release]
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Close milestone matching tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.release-please.outputs.tag_name }}
        run: |
          milestone=$(gh api "repos/${{ github.repository }}/milestones?state=open" \
            --jq ".[] | select(.title == \"$TAG\") | .number" | head -n1)
          if [ -n "$milestone" ]; then
            gh api -X PATCH "repos/${{ github.repository }}/milestones/$milestone" \
              -f state=closed
          fi
