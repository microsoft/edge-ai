---
name: Release Please
# PAI 1+6 parity: branch protection on main requires the pr-validation aggregator,
# so CI gating happens before merge rather than via inline `uses:` calls here.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-please-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: app-token
        with:
          client-id: ${{ vars.RELEASE_APP_CLIENT_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}

      - uses: chainguard-dev/actions/setup-gitsign@c69a264ec2a5934c3186c618f368fc1c86f16cff # v1.6.19

      - uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        id: release
        with:
          token: ${{ steps.app-token.outputs.token }}
          config-file: release-please-config.json
          manifest-file: release-please-manifest.json
          skip-github-pull-request: ${{ github.event_name == 'push' && startsWith(github.event.head_commit.message, 'chore(main)') }}

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        if: steps.release.outputs.release_created == 'true'
        with:
          token: ${{ steps.app-token.outputs.token }}
          fetch-depth: 0

      - name: Create signed git tag for draft release
        if: steps.release.outputs.release_created == 'true'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          TAG: ${{ steps.release.outputs.tag_name }}
        run: |
          set -euo pipefail

          git config --global gpg.format x509
          git config --global gpg.x509.program gitsign
          git config --global tag.gpgSign true
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git fetch --tags --force

          if git rev-parse "refs/tags/${TAG}" >/dev/null 2>&1; then
            tag_type=$(git cat-file -t "refs/tags/${TAG}")
            if [[ "${tag_type}" != "tag" ]]; then
              echo "Expected annotated tag object for ${TAG}, found ${tag_type}." >&2
              exit 1
            fi
            echo "Git tag ${TAG} already exists"
            exit 0
          fi

          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git tag -s "${TAG}" "${GITHUB_SHA}" -m "Release ${TAG}"
          git push origin "refs/tags/${TAG}"
          echo "Created signed git tag ${TAG} -> ${GITHUB_SHA}"

      - name: Verify signed git tag
        if: steps.release.outputs.release_created == 'true'
        env:
          TAG: ${{ steps.release.outputs.tag_name }}
        run: |
          set -euo pipefail
          gitsign verify-tag \
            --certificate-identity 'https://github.com/microsoft/edge-ai/.github/workflows/release-please.yml@refs/heads/main' \
            --certificate-oidc-issuer 'https://token.actions.githubusercontent.com' \
            "${TAG}"

  generate-dependency-sbom:
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}
          fetch-depth: 1

      - uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          format: spdx-json
          output-file: dep-sbom.spdx.json
          upload-artifact: false
          upload-release-assets: false

      - id: attest-sbom
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          subject-path: dep-sbom.spdx.json
          predicate-type: https://spdx.dev/Document/v2.3
          predicate-path: dep-sbom.spdx.json

      - name: Extract DSSE envelope
        run: |
          set -euo pipefail
          jq '.dsseEnvelope' "${{ steps.attest-sbom.outputs.bundle-path }}" > dep-sbom.spdx.json.intoto.jsonl

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dep-sbom
          path: |
            dep-sbom.spdx.json
            dep-sbom.spdx.json.intoto.jsonl
          if-no-files-found: error

      - name: Attach SBOM to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          gh release upload "${{ needs.release-please.outputs.tag_name }}" \
            dep-sbom.spdx.json dep-sbom.spdx.json.intoto.jsonl \
            --repo "${GITHUB_REPOSITORY}" \
            --clobber

  attest-release:
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}

      - name: Stage release source tarball
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.release-please.outputs.tag_name }}
        run: |
          set -euo pipefail
          mkdir -p release-artifacts
          gh api "repos/${{ github.repository }}/tarball/${TAG}" \
            > "release-artifacts/source-${TAG}.tar.gz"

      - id: provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: 'release-artifacts/*'

      - name: Extract DSSE envelope
        run: |
          set -euo pipefail
          jq '.dsseEnvelope' "${{ steps.provenance.outputs.bundle-path }}" \
            > "release-artifacts/source-${{ needs.release-please.outputs.tag_name }}.tar.gz.intoto.jsonl"

      - name: Attach provenance to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.release-please.outputs.tag_name }}
        run: |
          set -euo pipefail
          gh release upload "${TAG}" \
            "release-artifacts/source-${TAG}.tar.gz" \
            "release-artifacts/source-${TAG}.tar.gz.intoto.jsonl" \
            --repo "${GITHUB_REPOSITORY}" \
            --clobber

  sbom-diff:
    needs: [release-please, generate-dependency-sbom]
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dep-sbom
          path: current-sbom

      - name: Fetch previous release SBOM
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.release-please.outputs.tag_name }}
        run: |
          set -euo pipefail
          mkdir -p previous-sbom
          prev=$(gh release list --repo "${GITHUB_REPOSITORY}" --limit 10 \
            --json tagName,isDraft \
            --jq '[.[] | select(.tagName != env.TAG and .isDraft == false)] | first | .tagName // empty')
          if [[ -n "${prev}" ]]; then
            gh release download "${prev}" --repo "${GITHUB_REPOSITORY}" \
              --pattern 'dep-sbom.spdx.json' \
              --dir previous-sbom || true
          fi

      - name: Diff SBOMs
        run: |
          set -euo pipefail
          if [[ -f previous-sbom/dep-sbom.spdx.json ]]; then
            diff -u previous-sbom/dep-sbom.spdx.json current-sbom/dep-sbom.spdx.json \
              > sbom-diff.txt || true
          else
            printf 'No previous SBOM available; this is the baseline release.\n' > sbom-diff.txt
          fi

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sbom-diff
          path: sbom-diff.txt
          if-no-files-found: error

  append-verification-notes:
    needs: [release-please, attest-release, sbom-diff]
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: sbom-diff
          path: sbom-diff

      - name: Compose and apply verification appendix
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.release-please.outputs.tag_name }}
          OWNER: ${{ github.repository_owner }}
        run: |
          set -euo pipefail
          start_marker='<!-- edge-ai-release-verification:start -->'
          end_marker='<!-- edge-ai-release-verification:end -->'
          {
            printf '%s\n\n' "${start_marker}"
            printf '## Verification\n\n'
            printf 'Verify the signed tag:\n\n'
            printf '```sh\n'
            printf 'git fetch --tags\n'
            printf 'gitsign verify-tag \\\n'
            printf "  --certificate-identity 'https://github.com/microsoft/edge-ai/.github/workflows/release-please.yml@refs/heads/main' \\\n"
            printf "  --certificate-oidc-issuer 'https://token.actions.githubusercontent.com' \\\n"
            printf '  %s\n' "${TAG}"
            printf '```\n\n'
            printf 'Verify a downloaded artifact attestation:\n\n'
            printf '```sh\n'
            printf 'gh attestation verify <artifact> --owner %s --bundle <artifact>.intoto.jsonl\n' "${OWNER}"
            printf '```\n\n'
            printf '### SBOM diff (vs previous release)\n\n'
            printf 'Full SBOM diff evidence is attached to this release as `sbom-diff.txt`.\n\n'
            printf '%s\n' "${end_marker}"
          } > notes-appendix.md
          gh release upload "${TAG}" sbom-diff/sbom-diff.txt \
            --repo "${GITHUB_REPOSITORY}" \
            --clobber
          gh release view "${TAG}" --repo "${GITHUB_REPOSITORY}" \
            --json body --jq .body > existing-body.md
          if grep -Fxq "${start_marker}" existing-body.md; then
            awk -v start="${start_marker}" -v end="${end_marker}" '
              BEGIN { skipping = 0; inserted = 0 }
              $0 == start {
                while ((getline line < "notes-appendix.md") > 0) {
                  print line
                }
                close("notes-appendix.md")
                skipping = 1
                inserted = 1
                next
              }
              skipping && $0 == end { skipping = 0; next }
              !skipping { print }
              END {
                if (skipping) {
                  exit 1
                }
                if (!inserted) {
                  exit 2
                }
              }
            ' existing-body.md > merged-body.md
          else
            cat existing-body.md > merged-body.md
            if [[ -s merged-body.md ]]; then
              printf '\n\n' >> merged-body.md
            fi
            cat notes-appendix.md >> merged-body.md
          fi
          body_size=$(wc -m < merged-body.md | tr -d '[:space:]')
          max_body_size=110000
          if (( body_size > max_body_size )); then
            printf 'Release body is %s characters, which exceeds the %s character guard.\n' \
              "${body_size}" "${max_body_size}" >&2
            exit 1
          fi
          gh release edit "${TAG}" --repo "${GITHUB_REPOSITORY}" \
            --notes-file merged-body.md

  publish-release:
    needs: [release-please, attest-release, sbom-diff, append-verification-notes]
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Flip release draft to published
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.release-please.outputs.tag_name }}
        run: |
          set -euo pipefail
          gh release edit "${TAG}" --repo "${GITHUB_REPOSITORY}" --draft=false

  close-milestone:
    needs: [release-please, publish-release]
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Close milestone matching tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.release-please.outputs.tag_name }}
        run: |
          set -euo pipefail
          milestone=$(gh api "repos/${{ github.repository }}/milestones?state=open" \
            --jq ".[] | select(.title == \"$TAG\") | .number" | head -n1)
          if [[ -n "${milestone}" ]]; then
            gh api -X PATCH "repos/${{ github.repository }}/milestones/${milestone}" \
              -f state=closed
          fi
