---
# Resource Provider PowerShell Tests Workflow
#
# Purpose:
# This reusable workflow validates that PowerShell scripts for Azure resource provider
# registration and unregistration work correctly using Pester tests.
#
# Functionality:
# - Tests PowerShell scripts in the subscription management directory using Pester
# - Publishes test results as artifacts for troubleshooting failed tests
# - Displays test results directly in the GitHub interface
# - Can be conditionally called from PR validation or main branch workflows
#
# Parameters:
# - working-directory: Directory containing the resource provider scripts to test
# - test-results-output: Path to output PowerShell test results in NUnit format
#
# Output Variables:
# - None directly, but publishes test results as artifacts and to the GitHub interface
#
# Usage Examples:
# ```yaml
# # Basic usage in PR validation:
# pwsh-provider-tests:
#   name: PowerShell Provider Tests
#   needs: [shell-lint, matrix-changes]
#   if: needs.matrix-changes.outputs.changesInRpEnablementPwsh == 'true'
#   uses: ./.github/workflows/resource-provider-pwsh-tests.yml
#   with:
#     working-directory: 'src/azure-resource-providers'
#     test-results-output: 'PWSH-TEST-RESULTS.xml'
#
# # Usage in main workflow with custom path:
# pwsh-provider-tests-main:
#   name: PowerShell Resource Provider Tests (Main)
#   uses: ./.github/workflows/resource-provider-pwsh-tests.yml
#   with:
#     working-directory: 'custom/path/to/scripts'
# ```
#
# This workflow relies on the presence of Invoke-Pester.ps1 in the scripts directory
# to execute the tests. The tests are expected to be in the standard Pester format.

name: Resource Provider PowerShell Tests

on:  # yamllint disable-line rule:truthy
  workflow_call:
    inputs:
      working-directory:
        description: 'Directory containing the resource provider scripts'
        required: false
        type: string
        default: 'src/azure-resource-providers'
      test-results-output:
        description: 'Path to output PowerShell test results'
        required: false
        type: string
        default: 'PWSH-TEST-RESULTS.xml'

permissions:
  contents: read
jobs:
  # Job to run PowerShell script tests for the resource providers
  resource-provider-pwsh-test:
    name: PowerShell Resource Provider Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      # Run Pester tests for the resource provider scripts
      - name: Run Pester Tests
        shell: pwsh
        run: |
          ./scripts/Invoke-Pester.ps1 -Path ./${{ inputs.working-directory }} -OutputFile ${{ inputs.test-results-output }}
          if ($LASTEXITCODE -ne 0) {
            Write-Error "Pester tests failed with exit code $LASTEXITCODE"
            exit $LASTEXITCODE
          }
        working-directory: ${{ github.workspace }}

      # Publish the Pester test results
      - name: Publish Test Results
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: pester-test-results
          path: ${{ inputs.test-results-output }}

      - name: Publish test summary to GitHub
        if: ${{ !cancelled() }}
        uses: actions/github-script@450193c5abd4cdb17ba9f3ffcfe8f635c4bb6c2a # v7.0.1
        with:
          script: |
            const fs = require('fs');
            const resultsFile = '${{ inputs.test-results-output }}';

            if (!fs.existsSync(resultsFile)) {
              core.warning('Test results file not found: ' + resultsFile);
              return;
            }

            const xml = fs.readFileSync(resultsFile, 'utf8');

            const attr = (tag, name) => {
              const match = xml.match(new RegExp(`<${tag}[^>]*\\s${name}="([^"]*)"`, 's'));
              return match ? match[1] : undefined;
            };

            const numberAttr = (tag, name) => {
              const value = attr(tag, name);
              return value !== undefined ? Number(value) : undefined;
            };

            const total = numberAttr('test-results', 'total') ?? 0;
            const failures = numberAttr('test-results', 'failures') ?? 0;
            const errors = numberAttr('test-results', 'errors') ?? 0;
            const skipped = numberAttr('test-results', 'not-run') ?? numberAttr('test-results', 'skipped') ?? 0;
            const computed = total - failures - errors - skipped;
            const passed = numberAttr('test-results', 'passed') ?? (Number.isFinite(computed) ? computed : 0);
            const timeTaken = attr('test-results', 'time') || attr('test-results', 'duration') || '';
            const result = (failures + errors) === 0 ? '✅ Passed' : '❌ Failed';

            let summary = '## PowerShell Resource Provider Test Results\n\n';
            summary += `| Metric | Value |\n|--------|-------|\n`;
            summary += `| Result | ${result} |\n`;
            summary += `| Total | ${total} |\n`;
            summary += `| Passed | ${passed} |\n`;
            summary += `| Failed | ${failures} |\n`;
            summary += `| Errors | ${errors} |\n`;
            summary += `| Skipped | ${skipped} |\n`;
            summary += `| Duration | ${timeTaken}s |\n`;

            const failureMatches = [...xml.matchAll(/<test-case[^>]*result="(?:Failed|Error)"[^>]*name="([^"]*)"[^>]*>/gs)];
            if (failureMatches.length > 0) {
              summary += '\n### Failed Tests\n\n';
              for (const m of failureMatches) {
                const testName = m[1];
                const msgMatch = m[0] + xml.substring(xml.indexOf(m[0]) + m[0].length, xml.indexOf('</test-case>', xml.indexOf(m[0])));
                const messageMatch = msgMatch.match(/<message><!\[CDATA\[([\s\S]*?)\]\]><\/message>/);
                const message = messageMatch ? messageMatch[1].substring(0, 200) : '';
                summary += `- **${testName}**${message ? ': ' + message : ''}\n`;
                core.error(`Test failed: ${testName}${message ? ' - ' + message : ''}`);
              }
            }

            await core.summary.addRaw(summary).write();
