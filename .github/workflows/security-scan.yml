# Security Scan
#
# Purpose:
# Reusable workflow that runs gitleaks, grype, and secretlint to detect secrets
# and vulnerabilities. Uploads SARIF reports to the GitHub Security tab.
#
# Parameters:
# - soft-fail: When true, all security violations are reported but do not fail the workflow (default: false)
# - grype-soft-fail: When true, Grype vulnerability findings warn instead of fail while
#   Gitleaks and Secretlint remain hard-fail. Use in PR validation where dependency-review-action
#   provides delta-aware vulnerability checking. (default: false)
#
# Usage Examples:
# ```yaml
# # Basic usage:
# security-scan:
#   uses: ./.github/workflows/security-scan.yml
#
# # With soft-fail (all scanners):
# security-scan:
#   uses: ./.github/workflows/security-scan.yml
#   with:
#     soft-fail: true
#
# # With grype-soft-fail (Grype warns, Gitleaks/Secretlint still fail):
# security-scan:
#   uses: ./.github/workflows/security-scan.yml
#   with:
#     grype-soft-fail: true
# ```
---
name: Security Scan

on:  # yamllint disable-line rule:truthy
  workflow_call:
    inputs:
      soft-fail:
        description: 'Whether to continue on security violations'
        required: false
        type: boolean
        default: false
      grype-soft-fail:
        description: 'Whether Grype findings warn instead of fail (Gitleaks/Secretlint remain hard-fail)'
        required: false
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Install Gitleaks
        shell: bash
        run: |
          set -euo pipefail
          GITLEAKS_VERSION="8.30.0"
          GITLEAKS_SHA256="79a3ab579b53f71efd634f3aaf7e04a0fa0cf206b7ed434638d1547a2470a66e"
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            -o /tmp/gitleaks.tar.gz
          echo "${GITLEAKS_SHA256}  /tmp/gitleaks.tar.gz" | sha256sum --check --strict
          tar -xzf /tmp/gitleaks.tar.gz -C /tmp gitleaks
          sudo mv /tmp/gitleaks /usr/local/bin/gitleaks
          rm /tmp/gitleaks.tar.gz
          gitleaks version

      - name: Run Gitleaks
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p security-results
          if ! gitleaks detect --config .gitleaks.toml --report-format sarif --report-path security-results/gitleaks-report.sarif --exit-code 1; then
            echo "GITLEAKS_FAILED=true" >> "$GITHUB_ENV"
            echo "::warning::Gitleaks detected potential secret(s). See SARIF report for details."
          fi

      - name: Install Grype
        shell: bash
        run: |
          set -euo pipefail
          GRYPE_VERSION="0.109.1"
          GRYPE_SHA256="da25d9e29ae61dbb432d0dafe1df5f6bfed6b275906107f1289bcc1898c2b2e4"
          curl -sSfL "https://github.com/anchore/grype/releases/download/v${GRYPE_VERSION}/grype_${GRYPE_VERSION}_linux_amd64.tar.gz" \
            -o /tmp/grype.tar.gz
          echo "${GRYPE_SHA256}  /tmp/grype.tar.gz" | sha256sum --check --strict
          tar -xzf /tmp/grype.tar.gz -C /tmp grype
          sudo mv /tmp/grype /usr/local/bin/grype
          rm /tmp/grype.tar.gz
          grype version

      - name: Run Grype
        shell: bash
        run: |
          set -euo pipefail
          if ! grype dir:. --config .grype.yaml 2>&1 | tee security-results/grype-results.txt; then
            echo "GRYPE_FAILED=true" >> "$GITHUB_ENV"
          fi

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v4.3.0
        with:
          node-version: '24'

      - name: Install Secretlint
        shell: bash
        run: |
          set -euo pipefail
          npm install --no-save secretlint @secretlint/secretlint-rule-preset-recommend

      - name: Run Secretlint
        shell: bash
        run: |
          set -euo pipefail
          if ! npx secretlint "**/*" "!**/node_modules/**" "!**/.git/**" "!**/.terraform/**" 2>&1 | tee security-results/secretlint-results.txt; then
            echo "SECRETLINT_FAILED=true" >> "$GITHUB_ENV"
          fi

      - name: Upload SARIF to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@c10b8064de6f491fea524254123dbe5e09572f13 # v4.35.1
        with:
          sarif_file: security-results/
        continue-on-error: true

      - name: Upload Security Results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: security-scan-results
          path: security-results/
          retention-days: 30

      - name: Job Summary
        if: always()
        shell: bash
        run: |
          {
            echo "## Security Scan Results"
            echo ""
            if [ "${GITLEAKS_FAILED:-}" = "true" ]; then
              echo "- :x: Gitleaks: potential secrets detected"
            else
              echo "- :white_check_mark: Gitleaks: passed"
            fi
            if [ "${GRYPE_FAILED:-}" = "true" ]; then
              echo "- :x: Grype: vulnerabilities found"
            else
              echo "- :white_check_mark: Grype: passed"
            fi
            if [ "${SECRETLINT_FAILED:-}" = "true" ]; then
              echo "- :x: Secretlint: secret patterns detected"
            else
              echo "- :white_check_mark: Secretlint: passed"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Fail on Security Violations
        if: always() && (env.GITLEAKS_FAILED == 'true' || env.GRYPE_FAILED == 'true' || env.SECRETLINT_FAILED == 'true')
        shell: bash
        env:
          SOFT_FAIL: ${{ inputs.soft-fail }}
          GRYPE_SOFT_FAIL: ${{ inputs.grype-soft-fail }}
        run: |
          HARD_FAILURE="false"
          if [ "${GITLEAKS_FAILED:-}" = "true" ] || [ "${SECRETLINT_FAILED:-}" = "true" ]; then
            HARD_FAILURE="true"
          fi
          if [ "${GRYPE_FAILED:-}" = "true" ]; then
            if [ "$GRYPE_SOFT_FAIL" = "true" ]; then
              echo "::warning::Grype vulnerabilities found (grype-soft-fail enabled, Gitleaks/Secretlint remain enforced)"
            else
              HARD_FAILURE="true"
            fi
          fi
          if [ "$HARD_FAILURE" = "true" ]; then
            if [ "$SOFT_FAIL" = "true" ]; then
              echo "::warning::Security scan violations found (soft-fail enabled)"
            else
              echo "::error::Security scan violations found"
              exit 1
            fi
          fi
