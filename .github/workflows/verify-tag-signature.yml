---
name: Verify Tag Signature
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: Tag name to verify (e.g. v1.2.3)
        required: true
        type: string

permissions: {}

concurrency:
  group: verify-tag-signature-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify-tag:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    env:
      TAG_NAME: ${{ inputs.tag || github.ref_name }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          fetch-tags: true

      - uses: chainguard-dev/actions/setup-gitsign@05fbd381f7c158bd33c9bbf3a28f67852269fdf8 # v1.6.21

      - name: Verify gitsign tag signature
        run: |
          set -euo pipefail
          if ! git rev-parse "refs/tags/${TAG_NAME}" >/dev/null 2>&1; then
            echo "Tag ${TAG_NAME} not found in repository." >&2
            exit 1
          fi
          tag_type=$(git cat-file -t "refs/tags/${TAG_NAME}")
          if [[ "${tag_type}" != "tag" ]]; then
            echo "Expected annotated tag object for ${TAG_NAME}, found ${tag_type}." >&2
            exit 1
          fi
          gitsign verify-tag \
            --certificate-identity 'https://github.com/microsoft/edge-ai/.github/workflows/release-please.yml@refs/heads/main' \
            --certificate-oidc-issuer 'https://token.actions.githubusercontent.com' \
            "${TAG_NAME}"

      - name: Surface Sigstore identity claims
        run: |
          set -euo pipefail
          git tag -v "${TAG_NAME}" 2>&1 \
            | grep -E '(Issuer|Subject|Identity|certificate)' \
            || true
