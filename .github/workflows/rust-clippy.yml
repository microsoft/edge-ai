# Rust Clippy Lint Workflow
#
# Purpose:
# Reusable workflow that runs cargo clippy on all Rust crates under src/.
# WASM crates (cdylib) are detected automatically and built with --target wasm32-wasip2.
#
# Parameters:
# - break_build: When true, clippy warnings fail the workflow (default: true)
#
# Usage Examples:
# ```yaml
# # Basic usage in a caller workflow:
# rust-clippy:
#   uses: ./.github/workflows/rust-clippy.yml
#
# # With break_build disabled:
# rust-clippy:
#   uses: ./.github/workflows/rust-clippy.yml
#   with:
#     break_build: false
# ```
---
name: Rust Clippy Lint Check

on:  # yamllint disable-line rule:truthy
  workflow_call:
    inputs:
      break_build:
        description: 'Fail the workflow if clippy finds lint violations'
        required: false
        type: boolean
        default: true

permissions:
  contents: read

jobs:
  rust-clippy:
    name: Rust Clippy Lint Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98 # v4.2.2
        with:
          fetch-depth: 0

      - name: Install Rust toolchain and clippy
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
        with:
          components: clippy
          targets: wasm32-wasip2

      - name: Run Clippy on all Rust crates
        shell: bash
        env:
          BREAK_BUILD: ${{ inputs.break_build }}
          CARGO_REGISTRIES_AIO_SDKS_TOKEN: ${{ secrets.CARGO_REGISTRIES_AIO_SDKS_TOKEN }}
        run: |
          set -euo pipefail
          FAILED=0
          for cargo_toml in $(find src/ -name "Cargo.toml" -not -path "./Cargo.toml"); do
            crate_dir=$(dirname "$cargo_toml")
            echo "::group::Clippy: $crate_dir"
            if grep -q 'crate-type.*=.*\["cdylib"\]' "$cargo_toml"; then
              echo "WASM crate detected — using --target wasm32-wasip2"
              (cd "$crate_dir" && cargo clippy --target wasm32-wasip2 -- -D warnings) || FAILED=1
            else
              (cd "$crate_dir" && cargo clippy -- -D warnings) || FAILED=1
            fi
            echo "::endgroup::"
          done
          if [ "$FAILED" -ne 0 ]; then
            if [ "$BREAK_BUILD" = "true" ]; then
              echo "::error::Clippy found lint violations in one or more crates"
              exit 1
            else
              echo "::warning::Clippy found lint violations in one or more crates"
            fi
          fi
