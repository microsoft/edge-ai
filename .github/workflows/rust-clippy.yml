# Rust Clippy Lint Workflow
#
# Purpose:
# Reusable workflow that runs cargo clippy on all Rust crates under src/.
# WASM crates (cdylib) are detected automatically and built with --target wasm32-wasip2.
#
# Parameters:
# - break-build: When true, clippy warnings fail the workflow (default: true)
#
# Usage Examples:
# ```yaml
# # Basic usage in a caller workflow:
# rust-clippy:
#   uses: ./.github/workflows/rust-clippy.yml
#
# # With break-build disabled:
# rust-clippy:
#   uses: ./.github/workflows/rust-clippy.yml
#   with:
#     break-build: false
# ```
---
name: Rust Clippy Lint Check

on:  # yamllint disable-line rule:truthy
  workflow_call:
    inputs:
      break-build:
        description: 'Fail the workflow if clippy finds lint violations'
        required: false
        type: boolean
        default: true

permissions:
  contents: read

jobs:
  rust-clippy:
    name: Rust Clippy Lint Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98 # v4.2.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install Rust toolchain and clippy
        shell: bash
        run: |
          RUSTUP_DIR=$(mktemp -d)
          RUSTUP_INIT="${RUSTUP_DIR}/rustup-init"
          RUSTUP_HASH=$(mktemp)
          RUSTUP_URL="https://static.rust-lang.org/rustup/dist/x86_64-unknown-linux-gnu/rustup-init"
          curl --proto '=https' --tlsv1.2 -sSf "${RUSTUP_URL}" -o "${RUSTUP_INIT}"
          curl --proto '=https' --tlsv1.2 -sSf "${RUSTUP_URL}.sha256" -o "${RUSTUP_HASH}"
          echo "$(awk '{print $1}' "${RUSTUP_HASH}")  ${RUSTUP_INIT}" | sha256sum -c -
          chmod +x "${RUSTUP_INIT}"
          "${RUSTUP_INIT}" -y --default-toolchain stable -c clippy
          rm -rf "${RUSTUP_DIR}" "${RUSTUP_HASH}"
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
          export PATH="$HOME/.cargo/bin:$PATH"
          rustup target add wasm32-wasip2

      - name: Install system dependencies
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler

      - name: Run Clippy on all Rust crates
        shell: bash
        env:
          BREAK_BUILD: ${{ inputs.break-build }}
          CARGO_REGISTRIES_AIO_SDKS_TOKEN: ${{ secrets.CARGO_REGISTRIES_AIO_SDKS_TOKEN }}
        run: |
          set -euo pipefail
          FAILED=0
          while IFS= read -r -d '' cargo_toml; do
            crate_dir=$(dirname "${cargo_toml}")
            if [[ "${crate_dir}" == *"media-capture-service"* ]]; then
              echo "Skipping ${crate_dir} (requires OpenCV/FFmpeg system libraries)"
              continue
            fi
            echo "::group::Clippy: ${crate_dir}"
            if [[ -z "${CARGO_REGISTRIES_AIO_SDKS_TOKEN:-}" ]] && grep -q 'registry = "aio-sdks"' "${cargo_toml}"; then
              echo "Skipping ${crate_dir} (requires aio-sdks registry token)"
              echo "::endgroup::"
              continue
            fi
            if grep -q 'crate-type.*=.*\["cdylib"\]' "${cargo_toml}"; then
              echo "WASM crate detected — using --target wasm32-wasip2"
              (cd "${crate_dir}" && cargo clippy --target wasm32-wasip2 -- -D warnings) || FAILED=1
            else
              (cd "${crate_dir}" && cargo clippy -- -D warnings) || FAILED=1
            fi
            echo "::endgroup::"
          done < <(find src/ -name "Cargo.toml" -print0)
          if [[ "${FAILED}" -ne 0 ]]; then
            if [[ "${BREAK_BUILD}" == "true" ]]; then
              echo "::error::Clippy found lint violations in one or more crates"
              exit 1
            else
              echo "::warning::Clippy found lint violations in one or more crates"
            fi
          fi
