[registries.crates-io]
protocol = "sparse"

# Azure IoT Operations Rust SDK packages are published on crates.io.
# See: https://github.com/Azure/iot-operations-sdks/tree/main/rust
#
# Packages are referenced by version in individual Cargo.toml files:
#   azure_iot_operations_mqtt     = "1.0.2"
#   azure_iot_operations_protocol = "1.0.0"
#   azure_iot_operations_services = { version = "1.3.0-beta1", features = ["state_store"] }
#
# For unreleased builds, use git dependencies with a pinned commit SHA instead:
#   azure_iot_operations_mqtt = { git = "https://github.com/Azure/iot-operations-sdks.git", rev = "<commit-sha>" }
