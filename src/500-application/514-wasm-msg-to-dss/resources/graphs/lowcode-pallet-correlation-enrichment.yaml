# Low-code pallet correlation enrichment
#
# Built-in (no-WASM) replacement for the `pallet_correlator_enricher` map operator
# (operators/msg-to-dss-key/src/enricher.rs), expressed with AIO data flow graph
# `datasets` enrichment + `map` rules. Paste these into the DOE / Operations
# experience portal map transform, or embed them in a DataflowGraph resource.
#
# Reference:
#   https://learn.microsoft.com/azure/iot-operations/connect-to-cloud/howto-dataflow-graphs-enrich
#   https://learn.microsoft.com/azure/iot-operations/connect-to-cloud/concept-dataflow-graphs-expressions
#
# ---------------------------------------------------------------------------
# Prerequisites
# ---------------------------------------------------------------------------
# Pallet creation records must already live in the Distributed State Store.
# Built-in enrichment reads a STATIC key holding NDJSON (one JSON object per
# line), so store every pallet creation record under one catalog key, e.g.:
#
#   key: pallet:catalog
#   value (NDJSON):
#     {"pallet_id":"PLT-001","production_date":"2026-05-01T08:00:00Z","machine_id":"M-1","quality_grade":"A","version_code":"V2","quantity_kg":500.0}
#     {"pallet_id":"PLT-002","production_date":"2026-05-03T06:30:00Z","machine_id":"M-2","quality_grade":"B","version_code":"V2","quantity_kg":480.0}
#
# Populate it with the AIO state store CLI, or write single-pallet records under
# per-id keys with the msg-to-dss-key operator and point `key` at that id.
#
# ---------------------------------------------------------------------------
# Source message shape (single pallet per event)
# ---------------------------------------------------------------------------
#   {
#     "pallet_id": "PLT-001",
#     "event_timestamp": "2026-06-04T10:00:00Z",
#     ... other consumption fields ...
#   }

# 1) Dataset: load the pallet catalog and match the record for this message.
#    The `as pallet` alias lets rules reference fields via $context(pallet).<field>.
#    First record where the expression is true wins.
datasets:
  - key: "pallet:catalog as pallet"
    inputs:
      - "$source.pallet_id"     # $1 - id on the incoming consumption event
      - "$context.pallet_id"    # $2 - id on the candidate catalog record
    expression: "$1 == $2"

# 2) Map: pass the original message through, then merge the matched pallet fields
#    and a correlation status. Rules that reference $context(pallet) are skipped
#    automatically when no record matches (status falls back to "uncorrelated").
map:
  # Passthrough: keep every field from the incoming consumption event.
  - inputs:
      - "*"
    output: "*"

  # Correlation status: "correlated" when a catalog record matched, else
  # "uncorrelated". (The WASM "partial" state only applies to multi-pallet
  # messages, which built-in enrichment does not fan out over - see notes.)
  - inputs:
      - "$context(pallet).pallet_id"
    output: "correlation.status"
    expression: 'if($1 == (), "uncorrelated", "correlated")'

  # Enriched creation fields from the matched catalog record.
  - inputs:
      - "$context(pallet).pallet_id"
    output: "correlation.pallet.pallet_id"
  - inputs:
      - "$context(pallet).production_date"
    output: "correlation.pallet.production_date"
  - inputs:
      - "$context(pallet).machine_id"
    output: "correlation.pallet.production_machine"
  - inputs:
      - "$context(pallet).quality_grade"
    output: "correlation.pallet.quality_grade"
  - inputs:
      - "$context(pallet).version_code"
    output: "correlation.pallet.version_code"
  - inputs:
      - "$context(pallet).quantity_kg"
    output: "correlation.pallet.production_quantity_kg"

# ---------------------------------------------------------------------------
# Not expressible in built-in enrichment (keep in WASM, or restructure upstream)
# ---------------------------------------------------------------------------
# 1. Array fan-out: the WASM iterates `pallet_ids[]` and emits one entry per
#    pallet. Built-in enrichment matches a SINGLE record per message. Options:
#      - Emit one event per pallet upstream (recommended for low-code), or
#      - Keep the WASM operator for batched multi-pallet messages.
#
# 2. Aging (aging_days / aging_hours): the expression language has no date
#    parsing functions, so production_date -> event_timestamp deltas cannot be
#    computed here. Keep that calculation in the WASM operator, or compute it
#    downstream (for example in the cloud) from production_date + event_timestamp.
