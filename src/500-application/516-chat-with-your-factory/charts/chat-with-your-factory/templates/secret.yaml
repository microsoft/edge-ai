{{- if .Values.secrets }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "chat-with-your-factory.fullname" . }}
  namespace: {{ include "chat-with-your-factory.namespace" . }}
  labels:
    {{- include "chat-with-your-factory.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- range $key, $value := .Values.secrets }}
  {{ $key }}: {{ $value | quote }}
  {{- end }}
{{- end }}
