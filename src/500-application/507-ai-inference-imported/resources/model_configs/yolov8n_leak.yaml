# Leak Detection Configuration — YOLOv8n fine-tuned
# Single-class model for industrial leak detection
---
model:
  name: "leak-detection-yolov8n"
  version: "1.0.0"
  model_type: "object_detection"
  description: "YOLOv8 Nano fine-tuned for industrial leak detection"
  path: "/models/yolov8n-leak/yolov8n-leak.onnx"
  size_mb: 6.5
  backends: ["onnx"]
  performance:
    avg_inference_ms: 45.0
    memory_usage_mb: 30.0
    accuracy: null  # TBD after training
    target_hardware: "cpu"

input:
  shape: [1, 3, 640, 640]
  dtype: "float32"
  format: "NCHW"
  value_range: [0.0, 1.0]
  color_space: "RGB"
  input_type: "image"

output:
  tensors:
    - name: "output0"
      shape: [1, 5, 8400]  # 4 box + 1 class
      dtype: "float32"
      semantic: "detections"
  postprocess_type: "yolov8"
  confidence_threshold: 0.35  # Lower threshold for leak detection — prefer recall
  nms_threshold: 0.4
  max_detections: 10
  class_labels:
    - "leak"

preprocessing:
  resize_strategy: "letterbox"
  target_size: [640, 640]
  normalization:
    mean: [0.0, 0.0, 0.0]
    std: [1.0, 1.0, 1.0]
    scale_to_unit: true
  steps: []

postprocessing:
  postprocess_type: "yolov8"
  parameters:
    anchors: []
    strides: [8, 16, 32]
    filter_classes: []  # All classes (only 1: leak)
  output_format: "detection"

parameters:
  iou_threshold: 0.4
  conf_threshold: 0.35
  max_det: 10
  agnostic_nms: false
  target_class_index: 0
  target_class_name: "leak"
