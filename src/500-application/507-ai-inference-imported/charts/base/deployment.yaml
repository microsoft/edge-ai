---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-edge-inference
  labels:
    app: ai-edge-inference
    component: ai-inference
    part-of: edge-ai-inference
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-edge-inference
  template:
    metadata:
      labels:
        app: ai-edge-inference
        component: ai-inference
        part-of: edge-ai-inference
    spec:
      initContainers:
        - name: models-init
          image: curlimages/curl:latest
          command: ['sh', '-c']
          args:
            - |
              echo "Initializing models directory..."
              mkdir -p /models
              if [ -f /models/default.onnx ]; then
                echo "Model already exists at /models/default.onnx, skipping download."
              else
                echo "Downloading YOLOv8n Leak model to /models/default.onnx..."
                curl -L --retry 3 --retry-delay 5 -o /models/default.onnx \
                  "https://github.com/L3ONARDO/LD-Data-Dump/raw/refs/heads/main/yolov8n-leak.onnx"
                echo "Download complete."
              fi
              ls -la /models/
              echo "Models directory initialization complete."
          volumeMounts:
            - name: models-volume
              mountPath: /models
      containers:
        - name: ai-edge-inference
          image: acrmodules01.azurecr.io/ai-edge-inference:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              name: metrics
              protocol: TCP
            - containerPort: 8081
              name: health
              protocol: TCP
          env:
            - name: RUST_LOG
              value: "debug"
            - name: AIO_BROKER_HOSTNAME
              value: "aio-broker.azure-iot-operations"
            - name: AIO_BROKER_TCP_PORT
              value: "18883"
            - name: AIO_TLS_CA_FILE
              value: "/var/run/certs/ca.crt"
            - name: AIO_SAT_FILE
              value: "/var/run/secrets/tokens/mq-sat"
            - name: AIO_MQTT_CLIENT_ID
              value: "ai-edge-inference-edge-device-01"
            - name: MQTT_INPUT_TOPICS
              value: "azure-iot-operations/data/+/snapshots"
            - name: MQTT_QOS_LEVEL
              value: "1"
            - name: TOPIC_PREFIX
              value: "edge-ai/business_unit/facility/gateway_id/"
            - name: MODELS_DIRECTORY
              value: "/models"
            - name: MODEL_CONFIG_PATH
              value: "/models/yolov8n_leak.yaml"
            - name: METRICS_PORT
              value: "8080"
            - name: HEALTH_PORT
              value: "8081"
            - name: DEVICE_NAME
              value: "edge-device-01"
            - name: SITE
              value: "pilot-site"
            - name: FACILITY
              value: "test-facility"
            - name: REGION
              value: "us-south"
            - name: BUSINESS_UNIT
              value: "upstream"
            - name: ENABLE_GPU
              value: "false"
            - name: ENABLE_CUDA
              value: "false"
            - name: ENABLE_TENSORRT
              value: "false"
            - name: INFERENCE_BACKEND
              value: "onnx"
            - name: ONNX_PROVIDERS
              value: "cpu"
            - name: LD_LIBRARY_PATH
              value: "/opt/onnxruntime/lib"
            - name: ORT_LIB_LOCATION
              value: "/opt/onnxruntime/lib"
            - name: ONNXRUNTIME_SO_PATH
              value: "/opt/onnxruntime/lib/libonnxruntime.so"
            - name: PUBLISH_CONFIDENCE_THRESHOLD
              value: "0.9"
            - name: DEFAULT_MODELS
              value: "yolov8n-leak"
            - name: SKIP_MODEL_VALIDATION
              value: "true"
            - name: INFERENCE_MODE
              value: "cpu_only"
            - name: FORCE_CPU_BACKEND
              value: "true"
            - name: DISABLE_GPU_BACKENDS
              value: "true"
            - name: DEBUG_BACKEND_SELECTION
              value: "true"
            - name: FALLBACK_MODE
              value: "true"
            - name: ORT_DISABLE_ALL_OPTIMIZATIONS
              value: "1"
            - name: ORT_FORCE_CPU_PROVIDER
              value: "1"
            - name: DEMO_MODE
              value: "false"
            - name: BYPASS_AI_ENGINE
              value: "false"
            - name: MOCK_INFERENCE_RESULTS
              value: "false"
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "2Gi"
              cpu: "1000m"
          # Temporarily disabled health checks for debugging
          # livenessProbe:
          #   httpGet:
          #     path: /healthz
          #     port: health
          #   initialDelaySeconds: 30
          #   periodSeconds: 30
          #   timeoutSeconds: 10
          #   failureThreshold: 3
          # readinessProbe:
          #   httpGet:
          #     path: /readyz
          #     port: health
          #   initialDelaySeconds: 15
          #   periodSeconds: 10
          #   timeoutSeconds: 5
          #   failureThreshold: 3
          # startupProbe:
          #   httpGet:
          #     path: /startup
          #     port: health
          #   initialDelaySeconds: 10
          #   periodSeconds: 5
          #   timeoutSeconds: 5
          #   failureThreshold: 10
          volumeMounts:
            - name: mq-sat
              mountPath: /var/run/secrets/tokens
              readOnly: true
            - name: trust-bundle
              mountPath: /var/run/certs
              readOnly: true
            - name: models-volume
              mountPath: /models
            - name: logs-volume
              mountPath: /logs

      volumes:
        - name: mq-sat
          projected:
            sources:
              - serviceAccountToken:
                  path: mq-sat
                  audience: aio-internal
                  expirationSeconds: 3600
        - name: trust-bundle
          configMap:
            name: azure-iot-operations-aio-ca-trust-bundle
        - name: models-volume
          persistentVolumeClaim:
            claimName: ai-models-pvc
        - name: logs-volume
          emptyDir: {}
      restartPolicy: Always
      serviceAccountName: ai-edge-inference-sa
