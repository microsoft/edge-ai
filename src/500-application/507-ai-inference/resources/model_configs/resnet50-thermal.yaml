# ResNet50 Thermal configuration for predictive maintenance
# Fine-tuned for thermal anomaly detection in industrial equipment
# Based on universal computer vision runtime approach

model:
  name: "resnet50-thermal-anomaly"
  version: "1.0.0"
  description: "ResNet50 fine-tuned on thermal images for equipment anomaly detection (76.1% top-1, 15-30ms)"
  path: "models/resnet50-thermal.onnx"
  type: "vision"
  backends: ["onnx", "candle"]

inference:
  input_type: "image"
  preprocessing:
    resize: [224, 224]  # ResNet standard input
    normalize: true
    mean: [0.485, 0.456, 0.406]  # ImageNet pre-trained weights
    std: [0.229, 0.224, 0.225]
    color_mode: "RGB"  # Thermal images converted to 3-channel
    thermal_scaling: true  # Normalize thermal range [0-255]
  postprocessing:
    type: "classification"
    config:
      semantic: "classification"
      num_classes: 8
      softmax: true
      top_k: 3
  postprocess_type: "classification"
  output_format: "classification"

performance:
  batch_size: 1
  target_latency_ms: 30
  expected_latency_ms: 20  # Jetson AGX Orin with TensorRT
  gpu_required: true
  tensorrt_optimized: true

use_cases:
  - "Predictive maintenance"
  - "Equipment overheating detection"
  - "Bearing wear analysis"
  - "Motor health monitoring"
  - "Thermal anomaly classification"

class_labels:
  # Equipment health states
  - "normal"
  - "minor_heating"
  - "moderate_heating"
  - "severe_overheating"
  - "bearing_wear"
  - "lubrication_failure"
  - "misalignment"
  - "critical_failure"

metrics:
  top1_accuracy: 76.1
  top5_accuracy: 92.9
  model_size_mb: 98
  params_millions: 25.6

thermal_config:
  input_format: "flir_radiometric"  # FLIR thermal camera format
  temperature_range: [-20, 150]  # Celsius
  emissivity: 0.95  # Default emissivity for industrial equipment
  distance_correction: true
  atmospheric_transmission: 0.99

multi_modal:
  fusion_enabled: true
  sensor_inputs:
    - "vibration_fft"  # Frequency domain features
    - "temperature_scalar"  # Discrete temperature sensor
    - "visual_rgb"  # Visual camera for context
  fusion_method: "late_fusion"  # Combine predictions from multiple modalities
  ensemble_threshold: 0.7  # Alert only when multiple models agree

alert_thresholds:
  normal: [0.0, 0.3]
  warning: [0.3, 0.6]
  critical: [0.6, 1.0]
