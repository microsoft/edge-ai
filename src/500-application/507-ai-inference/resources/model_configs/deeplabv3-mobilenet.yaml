# DeepLabV3+ MobileNetV2 configuration for semantic segmentation
# Optimized for people counting, zone occupancy, and retail analytics
# Based on universal computer vision runtime approach

model:
  name: "deeplabv3-mobilenet-segmentation"
  version: "1.0.0"
  description: "DeepLabV3+ MobileNet for semantic segmentation - zone occupancy and people flow (72.4% mIoU, 50-120ms)"
  path: "models/deeplabv3-mobilenet.onnx"
  type: "vision"
  backends: ["onnx"]

inference:
  input_type: "image"
  preprocessing:
    resize: [513, 513]  # DeepLabV3+ standard input
    normalize: true
    mean: [0.485, 0.456, 0.406]  # ImageNet normalization
    std: [0.229, 0.224, 0.225]
    color_mode: "RGB"
  postprocessing:
    type: "segmentation"
    config:
      semantic: "segmentation"
      num_classes: 21  # PASCAL VOC classes (or customize)
      output_stride: 16
      argmax_dimension: 1
  postprocess_type: "segmentation"
  output_format: "segmentation"

performance:
  batch_size: 1
  target_latency_ms: 120
  expected_latency_ms: 80  # Jetson AGX Orin
  gpu_required: false  # Can run on CPU for lower FPS
  tensorrt_optimized: true

use_cases:
  - "Retail people counting"
  - "Zone occupancy analysis"
  - "People flow heatmaps"
  - "Smart building occupancy"
  - "Queue detection"

class_labels:
  # PASCAL VOC 21 classes (customize for retail/building scenarios)
  - "background"
  - "person"
  - "entrance"
  - "checkout"
  - "aisle"
  - "queue_area"
  - "fitting_room"
  - "parking"
  - "lobby"
  - "corridor"
  - "office"
  - "conference_room"
  - "restroom"
  - "elevator"
  - "stairs"
  - "emergency_exit"
  - "restricted_area"
  - "storage"
  - "loading_dock"
  - "outdoor"
  - "other"

metrics:
  miou: 72.4
  pixel_accuracy: 93.5
  model_size_mb: 19
  params_millions: 5.8

privacy:
  gdpr_compliant: true
  pii_handling: "none"  # No facial features, aggregate zone counts only
  data_retention: "real_time_only"  # No raw video storage
